<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ElderCare English | 35 Caregiving Exercises</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: linear-gradient(135deg, #fef7e8 0%, #fff3e0 100%); }
    .option-btn, .true-btn, .false-btn { transition: all 0.2s; }
    .option-btn:hover:not(:disabled), .true-btn:hover:not(:disabled), .false-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .feedback-animation { animation: fadeSlide 0.3s ease forwards; }
    .heart-pulse { animation: pulse 0.4s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .audio-btn, .audio-dialog-btn { transition: all 0.15s; }
    .audio-btn:hover:not(:disabled), .audio-dialog-btn:hover { transform: scale(1.05); background-color: #fde68a; }
    .playing { animation: pulse 0.6s ease; background-color: #fbbf24 !important; }
    .short-input:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
  </style>
</head>
<body>
  <div id="app-root"></div>
  <script>
    (function(){
      const EXERCISES = [
        { type: "multiple", question: "How do you politely ask if an elderly person needs help walking?", options: ["Let me carry you", "Would you like me to help you walk?", "You need to walk now"], correct: 1, explanation: "Would you like me to help you walk? is respectful and kind." },
        { type: "multiple", question: "What is the most calming phrase for an anxious senior?", options: ["Calm down", "Everything is okay. I am here with you.", "Stop worrying"], correct: 1, explanation: "Everything is okay. I am here with you provides security." },
        { type: "multiple", question: "Best response when a senior refuses medication:", options: ["You have to take it now", "I understand. Would you like me to stay with you?", "Fine, skip it then"], correct: 1, explanation: "Validating feelings is best practice." },
        { type: "multiple", question: "What does 'I will bring you a warm blanket' mean?", options: ["Medicine", "Warm blanket", "Help walking"], correct: 1, explanation: "A warm blanket provides comfort." },
        { type: "multiple", question: "How do you ask about pain in a gentle way?", options: ["Does it hurt?", "Are you in any pain?", "Pain?"], correct: 1, explanation: "Are you in any pain? is gentle and professional." },
        { type: "multiple", question: "Complete: '______ I check your blood pressure?'", options: ["May", "Should", "Will"], correct: 0, explanation: "May I is the most respectful way." },
        { type: "multiple", question: "Best way to offer hydration:", options: ["Drink this now", "Would you like some water or juice?", "You need to drink"], correct: 1, explanation: "Offering choices respects autonomy." },
        { type: "multiple", question: "How to ask about restroom needs respectfully?", options: ["Do you need to go?", "Would you like me to assist you to the restroom?", "Let's go"], correct: 1, explanation: "Would you like me to assist you is most polite." },
        { type: "multiple", question: "What does 'Let me accompany you' mean?", options: ["Carry you", "Walk with you", "Feed you"], correct: 1, explanation: "Accompany means to go with someone." },
        { type: "multiple", question: "Best phrase to encourage eating:", options: ["Eat faster", "Would you like a few more bites?", "Finish everything"], correct: 1, explanation: "Would you like a few more bites is gentle." },
        { type: "multiple", question: "How to offer emotional support?", options: ["Cheer up", "I am here for you. Would you like to talk?", "Stop being sad"], correct: 1, explanation: "I am here for you shows genuine care." },
        { type: "multiple", question: "What does 'I will adjust your pillow' mean?", options: ["Bring food", "Make pillow comfortable", "Help walk"], correct: 1, explanation: "Adjusting a pillow helps comfort." },
        { type: "multiple", question: "How to ask if a senior wants company?", options: ["Do you want company?", "Would you like me to stay with you?", "You need company"], correct: 1, explanation: "Would you like me to stay is respectful." },
        { type: "multiple", question: "Kind way to say goodnight:", options: ["Go to sleep now", "Rest well. I will check on you.", "Sleep early"], correct: 1, explanation: "Rest well shows care and security." },
        { type: "multiple", question: "How to ask about mobility needs?", options: ["Can you walk?", "Would you like me to help you move around?", "You need exercise"], correct: 1, explanation: "Would you like me to help is polite." },
        { type: "multiple", question: "Best way to ask about medication side effects:", options: ["Are you feeling okay after your medicine?", "Did the medicine hurt you?", "Tell me if you feel bad"], correct: 0, explanation: "Are you feeling okay is caring." },
        { type: "truefalse", question: "Speak loudly to elderly people so they can hear better.", correct: "false", explanation: "False! Speak clearly at normal volume." },
        { type: "truefalse", question: "Asking 'How are you feeling?' shows empathy.", correct: "true", explanation: "Correct! It shows you care about their emotional state." },
        { type: "truefalse", question: "Rush elderly people when they are eating or walking.", correct: "false", explanation: "False! Allow them to move at their own pace." },
        { type: "truefalse", question: "Offering choices respects their autonomy.", correct: "true", explanation: "Correct! Choices empower seniors." },
        { type: "truefalse", question: "Maintain eye contact when speaking with elderly adults.", correct: "true", explanation: "Correct! Eye contact shows respect." },
        { type: "truefalse", question: "Ignore a senior who seems sad or withdrawn.", correct: "false", explanation: "False! Acknowledge their feelings and offer support." },
        { type: "truefalse", question: "Gentle touch on the shoulder can be reassuring.", correct: "true", explanation: "Correct! Gentle touch provides comfort." },
        { type: "truefalse", question: "Talk about a senior as if they are not in the room.", correct: "false", explanation: "False! Always speak directly to the senior." },
        { type: "truefalse", question: "Asking permission before providing care shows respect.", correct: "true", explanation: "Correct! May I help you respects dignity." },
        { type: "short", question: "Polite phrase to ask about restroom needs?", correctKeywords: ["would you like me to assist you to the restroom", "help you to the bathroom", "assist you"], explanation: "Would you like me to assist you to the restroom?" },
        { type: "short", question: "Gentle way to ask about pain?", correctKeywords: ["are you in any pain", "do you have pain", "does it hurt"], explanation: "Are you in any pain?" },
        { type: "short", question: "Kind way to say it's time for medicine?", correctKeywords: ["time for your medication", "may i bring your medication", "time for your medicine"], explanation: "It's time for your medication. May I bring it to you?" },
        { type: "short", question: "How to reassure an anxious senior?", correctKeywords: ["i am here with you", "you are safe", "everything is okay"], explanation: "I am here with you. You are safe." },
        { type: "short", question: "Phrase to offer help with walking?", correctKeywords: ["would you like me to help you walk", "let me help you walk", "take my arm"], explanation: "Would you like me to help you walk?" },
        { type: "short", question: "How to offer something to drink?", correctKeywords: ["would you like some water", "something to drink", "can i get you water"], explanation: "Would you like some water or juice?" },
        { type: "short", question: "Phrase showing you are listening to concerns?", correctKeywords: ["i understand", "tell me more", "i hear you"], explanation: "I understand. Tell me more." },
        { type: "short", question: "How to ask about comfort level?", correctKeywords: ["are you comfortable", "would you like me to adjust", "how can i make you comfortable"], explanation: "Are you comfortable? Would you like me to adjust anything?" },
        { type: "short", question: "Phrase to use when helping with meals?", correctKeywords: ["help with your meal", "can i help you eat", "help you with your food"], explanation: "Would you like some help with your meal?" },
        { type: "short", question: "Caring way to say goodnight?", correctKeywords: ["rest well", "sleep well", "i will check on you later"], explanation: "Rest well. I will check on you later." }
      ];

      const DIALOGUES = [
        { role: "caregiver", text: "Good morning. How did you sleep last night?" },
        { role: "senior", text: "Good morning. I slept a little, but I had beautiful dreams." },
        { role: "caregiver", text: "That is wonderful. Would you like some warm water?" },
        { role: "senior", text: "Yes, please. You are so thoughtful. Thank you." },
        { role: "caregiver", text: "I am here to make sure you feel comfortable and safe." },
        { role: "caregiver", text: "Let me help you sit up slowly. Take your time." },
        { role: "senior", text: "You are very patient. I appreciate your kindness." },
        { role: "caregiver", text: "It is my pleasure. Are you ready for your medication?" },
        { role: "senior", text: "Yes, I will take it with your help. Thank you." },
        { role: "caregiver", text: "I will be right outside if you need anything. Rest well." }
      ];

      const USEFUL_PHRASES = [
        { icon: "fa-tint", title: "Hydration", phrase: "Would you like some water or juice?" },
        { icon: "fa-walking", title: "Mobility", phrase: "Take my arm, I will walk with you slowly." },
        { icon: "fa-pills", title: "Medication", phrase: "It is time for your medication. May I bring it?" },
        { icon: "fa-heartbeat", title: "Support", phrase: "I am here for you. You are safe with me." },
        { icon: "fa-utensils", title: "Mealtime", phrase: "Would you like a few more bites?" },
        { icon: "fa-bed", title: "Rest", phrase: "Time to rest. I will dim the lights." }
      ];

      const TOTAL = EXERCISES.length;
      const POINTS = 10;
      let idx = 0, score = 0, lives = 5, answered = false, selected = null, fbMsg = null, fbType = null;
      let scoreSpan, heartsSpan, progressFill, progressText, questionDiv, optionsDiv, nextBtn, feedbackDiv;
      let voice = null, voiceReady = false;

      function cleanText(t){ return t.replace(/[.,!?;:'"“”‘’()]/g,' ').replace(/\s+/g,' ').trim().toLowerCase(); }
      async function loadVoice(){
        return new Promise(r=>{
          if(!window.speechSynthesis) return r(false);
          const check=()=>{
            let v = speechSynthesis.getVoices().find(v=>v.lang==='en-US' && (v.name.includes('Google')||v.name.includes('Jenny')||v.name.includes('Samantha')));
            if(!v) v = speechSynthesis.getVoices().find(v=>v.lang==='en-US');
            if(v){ voice=v; voiceReady=true; let s=document.getElementById('audioStatus'); if(s) s.innerHTML=`<span class="text-green-700"><i class="fas fa-check-circle"></i> Audio ready: ${v.name}</span>`; }
            r(voiceReady);
          };
          if(speechSynthesis.getVoices().length) check();
          else speechSynthesis.onvoiceschanged=check;
        });
      }
      async function speak(t,el){
        if(!voiceReady) await loadVoice();
        if(!voiceReady) return;
        speechSynthesis.cancel();
        let u=new SpeechSynthesisUtterance(cleanText(t));
        u.lang='en-US'; u.voice=voice; u.rate=0.85;
        if(el){ el.classList.add('playing'); u.onend=()=>el.classList.remove('playing'); }
        speechSynthesis.speak(u);
      }
      function updateUI(){
        if(scoreSpan) scoreSpan.innerText=score;
        if(progressText) progressText.innerText=Math.round(idx/TOTAL*100);
        if(progressFill) progressFill.style.width=idx/TOTAL*100+'%';
        if(heartsSpan){
          heartsSpan.innerHTML='';
          for(let i=0;i<5;i++) heartsSpan.innerHTML+=i<lives?'<i class="fas fa-heart text-red-500 text-2xl mx-0.5"></i>':'<i class="far fa-heart text-gray-400 text-2xl mx-0.5"></i>';
        }
      }
      function showFeedback(){
        if(!feedbackDiv) return;
        if(!fbMsg){ feedbackDiv.classList.add('hidden'); return; }
        feedbackDiv.classList.remove('hidden');
        feedbackDiv.className=`feedback-animation p-4 rounded-xl mt-6 ${fbType==='correct'?'bg-emerald-100 border-l-8 border-emerald-500 text-emerald-800':'bg-rose-100 border-l-8 border-rose-400 text-rose-800'}`;
        feedbackDiv.innerHTML=`<p class="font-medium">${fbMsg}</p>`;
      }
      function render(){
        if(!questionDiv || !optionsDiv) return;
        let ex=EXERCISES[idx];
        if(!ex) return;
        questionDiv.innerHTML=`<div class="text-2xl md:text-3xl font-bold text-stone-800">${ex.question}</div>`;
        optionsDiv.innerHTML='';
        if(ex.type==='multiple'){
          ex.options.forEach((opt,i)=>{
            let btn=document.createElement('button');
            btn.className=`option-btn w-full text-left p-5 rounded-2xl border-2 flex items-center gap-3 bg-white border-amber-200 ${!answered?'hover:shadow-md cursor-pointer':''}`;
            if(answered){
              if(i===ex.correct) btn.className+=' bg-emerald-50 border-emerald-400';
              else if(i===selected && i!==ex.correct) btn.className+=' bg-rose-50 border-rose-300';
              else btn.className+=' bg-white/70';
            }
            let p=document.createElement('span'); p.className='w-7 h-7 rounded-full bg-amber-100 text-amber-800 flex items-center justify-center font-medium text-sm'; p.innerText=String.fromCharCode(65+i);
            let t=document.createElement('span'); t.className='text-stone-700 text-lg font-medium flex-1'; t.innerText=opt;
            btn.appendChild(p); btn.appendChild(t);
            let a=document.createElement('button'); a.className='audio-btn ml-2 p-2 rounded-full bg-amber-100 text-amber-700 hover:bg-amber-200 transition flex-shrink-0'; a.innerHTML='<i class="fas fa-volume-up"></i>';
            a.onclick=async(e)=>{ e.stopPropagation(); await speak(opt,a); };
            btn.appendChild(a);
            if(answered && i===ex.correct){ let c=document.createElement('span'); c.className='text-emerald-600 text-xl ml-1'; c.innerHTML='✓'; btn.appendChild(c); }
            else if(answered && i===selected && i!==ex.correct){ let x=document.createElement('span'); x.className='text-rose-500 text-xl ml-1'; x.innerHTML='✗'; btn.appendChild(x); }
            if(!answered) btn.onclick=()=>{ if(answered)return; let correct=(i===ex.correct); selected=i; answered=true;
              if(correct){ score+=POINTS; fbType='correct'; fbMsg=`✅ Excellent! +${POINTS} points. ${ex.explanation}`; }
              else{ if(lives>0)lives--; if(heartsSpan)heartsSpan.classList.add('heart-pulse'); setTimeout(()=>heartsSpan?.classList.remove('heart-pulse'),400); fbType='wrong'; fbMsg=`❌ Incorrect. Correct: "${ex.options[ex.correct]}". ${ex.explanation}`; }
              updateUI(); render(); showFeedback();
              if(lives===0) setTimeout(()=>{ if(confirm("No hearts left. Restart?")) resetGame(); },150);
            };
            optionsDiv.appendChild(btn);
          });
        } else if(ex.type==='truefalse'){
          let cont=document.createElement('div'); cont.className='grid grid-cols-2 gap-4';
          let tBtn=document.createElement('button'); tBtn.className=`true-btn w-full p-5 rounded-2xl border-2 flex items-center justify-center gap-3 text-xl font-bold bg-white border-green-400 text-green-700 ${!answered?'hover:shadow-md cursor-pointer':''}`; tBtn.innerHTML='<i class="fas fa-check-circle mr-2"></i> TRUE';
          let fBtn=document.createElement('button'); fBtn.className=`false-btn w-full p-5 rounded-2xl border-2 flex items-center justify-center gap-3 text-xl font-bold bg-white border-red-400 text-red-700 ${!answered?'hover:shadow-md cursor-pointer':''}`; fBtn.innerHTML='<i class="fas fa-times-circle mr-2"></i> FALSE';
          if(answered){
            if(ex.correct==='true') tBtn.className+=' bg-emerald-50 border-emerald-500'; else fBtn.className+=' bg-emerald-50 border-emerald-500';
            if(selected==='true' && ex.correct!=='true') tBtn.className+=' bg-rose-50 border-rose-400';
            if(selected==='false' && ex.correct!=='false') fBtn.className+=' bg-rose-50 border-rose-400';
          }
          if(!answered){
            tBtn.onclick=()=>{ if(answered)return; let correct=(ex.correct==='true'); selected='true'; answered=true;
              if(correct){ score+=POINTS; fbType='correct'; fbMsg=`✅ Excellent! +${POINTS} points. ${ex.explanation}`; }
              else{ if(lives>0)lives--; if(heartsSpan)heartsSpan.classList.add('heart-pulse'); setTimeout(()=>heartsSpan?.classList.remove('heart-pulse'),400); fbType='wrong'; fbMsg=`❌ Incorrect. Answer is "${ex.correct}". ${ex.explanation}`; }
              updateUI(); render(); showFeedback();
              if(lives===0) setTimeout(()=>{ if(confirm("No hearts left. Restart?")) resetGame(); },150);
            };
            fBtn.onclick=()=>{ if(answered)return; let correct=(ex.correct==='false'); selected='false'; answered=true;
              if(correct){ score+=POINTS; fbType='correct'; fbMsg=`✅ Excellent! +${POINTS} points. ${ex.explanation}`; }
              else{ if(lives>0)lives--; if(heartsSpan)heartsSpan.classList.add('heart-pulse'); setTimeout(()=>heartsSpan?.classList.remove('heart-pulse'),400); fbType='wrong'; fbMsg=`❌ Incorrect. Answer is "${ex.correct}". ${ex.explanation}`; }
              updateUI(); render(); showFeedback();
              if(lives===0) setTimeout(()=>{ if(confirm("No hearts left. Restart?")) resetGame(); },150);
            };
          }
          cont.appendChild(tBtn); cont.appendChild(fBtn); optionsDiv.appendChild(cont);
        } else if(ex.type==='short'){
          let group=document.createElement('div'); group.className='space-y-4';
          let inp=document.createElement('input'); inp.type='text'; inp.id='shortInp'; inp.placeholder='Type your answer here...'; inp.className='short-input w-full p-5 rounded-2xl border-2 border-amber-200 text-lg bg-white'; inp.disabled=answered;
          if(answered && selected) inp.value=selected;
          let sub=document.createElement('button'); sub.textContent='Submit Answer'; sub.className='w-full p-4 rounded-2xl font-bold text-white text-lg bg-amber-600 hover:bg-amber-700 transition'; sub.disabled=answered;
          if(!answered) sub.onclick=()=>{
            let ans=document.getElementById('shortInp').value.trim().toLowerCase();
            let correct=ex.correctKeywords.some(k=>ans.includes(k));
            answered=true; selected=ans;
            if(correct){ score+=POINTS; fbType='correct'; fbMsg=`✅ Excellent! +${POINTS} points. ${ex.explanation}`; }
            else{ if(lives>0)lives--; if(heartsSpan)heartsSpan.classList.add('heart-pulse'); setTimeout(()=>heartsSpan?.classList.remove('heart-pulse'),400); fbType='wrong'; fbMsg=`❌ Incorrect. ${ex.explanation}`; }
            updateUI(); render(); showFeedback();
            if(lives===0) setTimeout(()=>{ if(confirm("No hearts left. Restart?")) resetGame(); },150);
          };
          group.appendChild(inp); group.appendChild(sub); optionsDiv.appendChild(group);
        }
        if(nextBtn){
          if(answered){ nextBtn.disabled=false; nextBtn.classList.remove('bg-gray-300','cursor-not-allowed'); nextBtn.classList.add('bg-amber-700','hover:bg-amber-800','cursor-pointer'); }
          else{ nextBtn.disabled=true; nextBtn.classList.add('bg-gray-300','cursor-not-allowed'); nextBtn.classList.remove('bg-amber-700','hover:bg-amber-800'); }
        }
        let badge=document.getElementById('typeBadge');
        if(badge){
          let txt='',col='';
          if(ex.type==='multiple'){ txt='MULTIPLE CHOICE'; col='bg-purple-100 text-purple-700'; }
          else if(ex.type==='truefalse'){ txt='TRUE / FALSE'; col='bg-green-100 text-green-700'; }
          else{ txt='SHORT ANSWER'; col='bg-orange-100 text-orange-700'; }
          badge.innerText=txt; badge.className=`inline-block px-3 py-1 rounded-full text-xs font-semibold ${col}`;
        }
      }
      function next(){
        if(!answered) return;
        if(lives===0){ if(confirm("No hearts left. Restart?")) resetGame(); return; }
        if(idx+1<TOTAL){ idx++; answered=false; selected=null; fbMsg=null; fbType=null; if(feedbackDiv)feedbackDiv.classList.add('hidden'); render(); updateUI(); }
        else{
          answered=true;
          fbMsg=`🎉 CONGRATULATIONS! You completed all 35 exercises! Score: ${score} / ${TOTAL*POINTS}`;
          fbType='complete';
          showFeedback();
          if(nextBtn) nextBtn.disabled=true;
          if(optionsDiv) optionsDiv.innerHTML=`<div class="text-center p-8 bg-amber-50 rounded-2xl"><i class="fas fa-trophy text-6xl text-amber-500 mb-3"></i><p class="text-xl font-bold">✨ All 35 Exercises Complete! ✨</p><button id="resetFinalBtn" class="mt-6 bg-amber-700 text-white px-6 py-3 rounded-xl font-bold">Restart</button></div>`;
          document.getElementById('resetFinalBtn')?.addEventListener('click',()=>resetGame());
        }
      }
      function resetGame(){ idx=0; score=0; lives=5; answered=false; selected=null; fbMsg=null; fbType=null; if(feedbackDiv)feedbackDiv.classList.add('hidden'); updateUI(); render(); document.getElementById('learning-app')?.scrollIntoView({behavior:'smooth'}); }
      function build(){
        let dHtml='', pHtml='';
        for(let d of DIALOGUES){
          let bg=d.role==='caregiver'?'bg-amber-50 border-l-8 border-amber-400':'bg-white border-l-8 border-emerald-300';
          let icon=d.role==='caregiver'?'<i class="fas fa-user-nurse text-amber-600"></i>':'<i class="fas fa-user-friends text-emerald-600"></i>';
          let role=d.role==='caregiver'?'CAREGIVER':'SENIOR';
          dHtml+=`<div class="${bg} p-5 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-start gap-3"><div class="flex-1"><div class="flex items-center gap-2 font-bold text-stone-700">${icon} <span>${role}</span></div><p class="text-xl font-semibold text-stone-800 mt-2">${d.text}</p></div><button class="audio-dialog-btn bg-amber-200 hover:bg-amber-300 text-amber-900 px-5 py-3 rounded-xl flex items-center gap-2 font-medium" data-phrase="${d.text.replace(/['"]/g,'\\"')}"><i class="fas fa-volume-up"></i> Listen</button></div>`;
        }
        for(let p of USEFUL_PHRASES){
          pHtml+=`<div class="bg-white rounded-2xl p-6 shadow-md border border-amber-100 text-center"><i class="fas ${p.icon} text-4xl text-amber-600 mb-3"></i><h3 class="font-bold text-xl text-stone-700">${p.title}</h3><p class="text-stone-600 mt-2 font-medium">"${p.phrase}"</p><button class="phrase-audio-btn mt-3 bg-amber-100 hover:bg-amber-200 text-amber-700 px-4 py-2 rounded-xl text-sm" data-phrase="${p.phrase.replace(/['"]/g,'\\"')}"><i class="fas fa-volume-up mr-1"></i> Hear it</button></div>`;
        }
        document.getElementById('app-root').innerHTML=`
          <header class="bg-gradient-to-br from-[#f9e7d2] to-[#f7e1c4] shadow-md"><div class="container mx-auto px-5 py-10"><div class="flex flex-col md:flex-row justify-between items-center gap-8"><div class="flex-1 text-center md:text-left"><div class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-white/60 text-amber-800 text-sm font-semibold mb-4"><i class="fas fa-heart"></i> 35 Exercises</div><h1 class="text-4xl md:text-6xl font-extrabold text-stone-800">Care in <span class="text-amber-700">English</span></h1><p class="text-lg text-stone-600 mt-4">35 exercises: Multiple Choice, True/False, Short Answer. Real dialogues + American pronunciation.</p><button id="startBtn" class="mt-8 bg-amber-700 hover:bg-amber-800 text-white font-semibold px-8 py-4 rounded-2xl shadow-xl"><i class="fas fa-play mr-2"></i> Start 35 Exercises</button></div><div class="flex-1 flex justify-center"><div class="w-64 h-64 bg-gradient-to-tr from-[#e9cfb0] to-[#dbbd97] rounded-full flex items-center justify-center shadow-2xl"><span class="text-8xl">👵🏽🤝👩🏽‍⚕️</span></div></div></div></div></header>
