<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ElderCare English | Aprende Inglés para el Cuidado del Adulto Mayor</title>
  <!-- Tailwind CSS + Google Fonts + Font Awesome (solo para íconos rápidos) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
    * {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #fef7e8 0%, #fff3e0 100%);
    }
    /* Animaciones suaves */
    .card-hover {
      transition: all 0.2s ease;
    }
    .option-btn {
      transition: all 0.2s;
    }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .feedback-animation {
      animation: fadeSlide 0.3s ease forwards;
    }
    .heart-pulse {
      animation: pulse 0.4s ease;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="app-root" class="min-h-screen flex flex-col"></div>

  <script>
    // --------------------------------------------------------------
    // DATOS DE EJERCICIOS (enfocados en cuidado de adulto mayor)
    // --------------------------------------------------------------
    const EXERCISES = [
      { // 0
        type: "multiple",
        question: "¿Cómo se dice 'ayudar al adulto mayor a caminar' en inglés?",
        options: ["To help the elderly walking", "To assist the senior to walk", "To support old people walk"],
        correct: 1,
        explanation: "✔️ 'To assist the senior to walk' es la forma más educada y profesional en cuidado de ancianos."
      },
      { // 1
        type: "fill",
        question: "Completa la frase: '______ I help you get comfortable?' (¿Puedo ayudarte a ponerte cómodo?)",
        options: ["May", "Should", "Will"],
        correct: 0,
        explanation: "🔹 'May I help you...' es la expresión más educada y suave para preguntar."
      },
      { // 2
        type: "multiple",
        question: "El adulto mayor se siente ansioso. ¿Cuál es la mejor frase para tranquilizarle?",
        options: ["Calm down now", "Everything is okay, I am here with you", "Stop worrying please"],
        correct: 1,
        explanation: "💙 'Everything is okay, I am here with you' transmite seguridad y acompañamiento."
      },
      { // 3
        type: "match",
        question: "Empareja 'Hydration' con su significado:",
        options: ["Comida balanceada", "Ingesta de líquidos / agua", "Movilidad suave"],
        correct: 1,
        explanation: "💧 Hydration = hidratación. Es vital preguntar: 'Are you drinking enough water?'"
      },
      { // 4
        type: "translate",
        question: "Traduce al inglés: '¿Tiene dolor en alguna parte?'",
        options: ["Are you in pain?", "Do you have pain somewhere?", "Does it hurt you?"],
        correct: 1,
        explanation: "✅ La forma más clara y empática: 'Do you have pain somewhere?'"
      },
      { // 5
        type: "multiple",
        question: "Para recordar la medicina diaria, la frase más respetuosa es:",
        options: ["Take your pill now", "It's time for your medication, may I bring it to you?", "You need medicine"],
        correct: 1,
        explanation: "💊 Ofrecer la medicina con cortesía: 'It's time for your medication, may I bring it to you?'"
      },
      { // 6
        type: "fill",
        question: "Completa: 'Let me ______ you to the dining room.' (Déjame acompañarte al comedor)",
        options: ["escort", "accompany", "walk"],
        correct: 1,
        explanation: "🚶 'accompany' es más cálido y profesional que 'walk'."
      },
      { // 7
        type: "multiple",
        question: "¿Cómo preguntar con sensibilidad sobre el estado emocional?",
        options: ["You look sad", "How are you feeling today, my friend?", "Why are you sad?"],
        correct: 1,
        explanation: "🌟 'How are you feeling today, my friend?' invita a compartir sin presión."
      },
      { // 8
        type: "translate",
        question: "Traduce: '¿Desea un poco más de agua o té?'",
        options: ["Do you want water or tea?", "Would you like some more water or tea?", "You need more water?"],
        correct: 1,
        explanation: "☕ 'Would you like...' es la forma más educada y amable en cuidado."
      },
      { // 9
        type: "multiple",
        question: "Para ayudar a dormir o descansar, lo mejor es decir:",
        options: ["Go to sleep now", "I'll be right outside if you need anything. Rest well", "Sleep early"],
        correct: 1,
        explanation: "🛌 Ofrecer seguridad: 'I'll be right outside... Rest well' genera calma."
      }
    ];

    const TOTAL_EXERCISES = EXERCISES.length;
    const POINTS_PER_CORRECT = 10;

    // Estado global
    let currentIndex = 0;
    let totalScore = 0;
    let lives = 5;
    let answered = false;
    let selectedOptionIdx = null;
    let feedbackMsg = null;
    let feedbackType = null; // 'correct', 'wrong'

    // Elementos del DOM
    let heroSection, appContainer, progressFill, scoreSpan, heartsContainer, questionEl, optionsContainer, nextBtn, feedbackEl;

    // Funciones de renderizado
    function updateUIState() {
      // Actualizar puntaje
      if (scoreSpan) scoreSpan.innerText = totalScore;
      // Actualizar corazones
      if (heartsContainer) {
        heartsContainer.innerHTML = '';
        for (let i = 0; i < 5; i++) {
          const heartIcon = document.createElement('i');
          heartIcon.className = i < lives ? 'fas fa-heart text-red-500 text-2xl mx-0.5' : 'far fa-heart text-gray-400 text-2xl mx-0.5';
          heartsContainer.appendChild(heartIcon);
        }
      }
      // Actualizar barra progreso
      const progressPercent = (currentIndex / TOTAL_EXERCISES) * 100;
      if (progressFill) progressFill.style.width = `${progressPercent}%`;
    }

    function renderCurrentExercise() {
      if (!questionEl || !optionsContainer) return;
      const exercise = EXERCISES[currentIndex];
      if (!exercise) return;

      questionEl.innerHTML = `<span class="text-2xl md:text-3xl font-bold text-stone-800">${exercise.question}</span>`;
      
      // Generar opciones
      optionsContainer.innerHTML = '';
      exercise.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = `option-btn w-full text-left p-5 rounded-2xl border-2 transition-all duration-150 flex items-center gap-3 ${!answered ? 'hover:shadow-md cursor-pointer' : 'cursor-default'}`;
        
        // Estilo según estado
        if (answered) {
          if (idx === exercise.correct) {
            btn.className += ' bg-emerald-50 border-emerald-400 ring-1 ring-emerald-200';
          } else if (idx === selectedOptionIdx && idx !== exercise.correct) {
            btn.className += ' bg-rose-50 border-rose-300';
          } else {
            btn.className += ' bg-white/70 border-amber-100';
          }
        } else {
          btn.className += ' bg-white border-amber-200';
          if (selectedOptionIdx === idx) btn.className += ' bg-amber-50 border-amber-400';
        }
        
        const prefix = document.createElement('span');
        prefix.className = 'w-7 h-7 rounded-full bg-amber-100 text-amber-800 flex items-center justify-center font-medium text-sm';
        prefix.innerText = String.fromCharCode(65+idx);
        const textSpan = document.createElement('span');
        textSpan.className = 'text-stone-700 text-lg font-medium flex-1';
        textSpan.innerText = opt;
        btn.appendChild(prefix);
        btn.appendChild(textSpan);
        
        if (answered && idx === exercise.correct) {
          const check = document.createElement('span');
          check.className = 'text-emerald-600 text-xl ml-auto';
          check.innerHTML = '✓';
          btn.appendChild(check);
        } else if (answered && idx === selectedOptionIdx && idx !== exercise.correct) {
          const cross = document.createElement('span');
          cross.className = 'text-rose-500 text-xl ml-auto';
          cross.innerHTML = '✗';
          btn.appendChild(cross);
        }
        
        if (!answered) {
          btn.addEventListener('click', () => handleAnswer(idx));
        }
        optionsContainer.appendChild(btn);
      });
      
      // actualizar botón siguiente
      if (nextBtn) {
        if (answered) {
          nextBtn.disabled = false;
          nextBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.add('bg-amber-700', 'hover:bg-amber-800', 'cursor-pointer');
        } else {
          nextBtn.disabled = true;
          nextBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.remove('bg-amber-700', 'hover:bg-amber-800');
        }
      }
    }

    function handleAnswer(selectedIdx) {
      if (answered) return;
      const exercise = EXERCISES[currentIndex];
      const isCorrect = (selectedIdx === exercise.correct);
      selectedOptionIdx = selectedIdx;
      answered = true;
      
      if (isCorrect) {
        totalScore += POINTS_PER_CORRECT;
        feedbackType = 'correct';
        feedbackMsg = `✅ ¡Excelente! +${POINTS_PER_CORRECT} puntos. ${exercise.explanation || 'Sigue así 💪'}`;
        // animación de corazón feliz (opcional)
      } else {
        if (lives > 0) {
          lives--;
          // animación de pérdida
          if (heartsContainer) heartsContainer.classList.add('heart-pulse');
          setTimeout(() => { if(heartsContainer) heartsContainer.classList.remove('heart-pulse'); }, 400);
        }
        feedbackType = 'wrong';
        feedbackMsg = `❌ Incorrecto. ${exercise.explanation || 'Revisa la respuesta correcta.'}`;
      }
      
      updateUIState();
      renderCurrentExercise();
      showFeedback();
      
      // Si se acaban las vidas, mostrar mensaje especial pero no bloquear next inmediatamente
      if (lives === 0) {
        setTimeout(() => {
          if(confirm("💔 Sin corazones. ¿Quieres reiniciar la práctica para seguir aprendiendo?")) {
            resetGame();
          }
        }, 100);
      }
    }
    
    function showFeedback() {
      if (!feedbackEl) return;
      if (!feedbackMsg) {
        feedbackEl.classList.add('hidden');
        return;
      }
      feedbackEl.classList.remove('hidden');
      const bgClass = (feedbackType === 'correct') ? 'bg-emerald-100 border-l-8 border-emerald-500 text-emerald-800' : 'bg-rose-100 border-l-8 border-rose-400 text-rose-800';
      feedbackEl.className = `feedback-animation p-4 rounded-xl ${bgClass} mt-6`;
      feedbackEl.innerHTML = `<p class="font-medium">${feedbackMsg}</p>`;
    }
    
    function nextExercise() {
      if (!answered) return;
      // Si vidas son 0 no permitir continuar a menos que se haya reiniciado
      if (lives === 0) {
        if(confirm("❤️‍🩹 No te quedan vidas. Reinicia para continuar practicando.")) resetGame();
        return;
      }
      
      if (currentIndex + 1 < TOTAL_EXERCISES) {
        currentIndex++;
        // resetear estado local
        answered = false;
        selectedOptionIdx = null;
        feedbackMsg = null;
        feedbackType = null;
        if (feedbackEl) feedbackEl.classList.add('hidden');
        renderCurrentExercise();
        updateUIState();
      } else {
        // Finalización completa
        answered = true;
        feedbackMsg = `🎉 ¡Felicidades! Completaste todos los ejercicios. Puntaje final: ${totalScore} / ${TOTAL_EXERCISES * POINTS_PER_CORRECT}. ¡Eres un cuidador/a excepcional! 🌟`;
        feedbackType = 'complete';
        showFeedback();
        if (nextBtn) nextBtn.disabled = true;
        // Mostrar mensaje de finalización
        const finalDiv = document.createElement('div');
        // No es necesario bloquear, pero deshabilitamos opciones
        optionsContainer.innerHTML = `<div class="text-center p-8 bg-amber-50 rounded-2xl"><i class="fas fa-trophy text-6xl text-amber-500 mb-3"></i><p class="text-xl font-bold">✨ Has completado el módulo ✨</p><button id="resetFinalBtn" class="mt-6 bg-amber-700 text-white px-6 py-3 rounded-xl font-bold">Reiniciar práctica</button></div>`;
        const resetBtn = document.getElementById('resetFinalBtn');
        if(resetBtn) resetBtn.addEventListener('click', () => resetGame());
      }
    }
    
    function resetGame() {
      currentIndex = 0;
      totalScore = 0;
      lives = 5;
      answered = false;
      selectedOptionIdx = null;
      feedbackMsg = null;
      feedbackType = null;
      if (feedbackEl) feedbackEl.classList.add('hidden');
      updateUIState();
      renderCurrentExercise();
      // scroll suave al inicio de app
      document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' });
    }
    
    // Render completo de la página (incluyendo hero y estructura)
    function buildFullUI() {
      const root = document.getElementById('app-root');
      if (!root) return;
      
      root.innerHTML = `
        <!-- Hero principal atractivo -->
        <header class="relative bg-gradient-to-br from-[#f9e7d2] to-[#f7e1c4] overflow-hidden shadow-md">
          <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 20% 40%, #b78c5a 2px, transparent 2px); background-size: 30px 30px;"></div>
          <div class="container mx-auto px-5 py-10 md:py-14 relative z-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
              <div class="flex-1 text-center md:text-left">
                <div class="inline-block px-4 py-1 rounded-full bg-white/60 backdrop-blur-sm text-amber-800 text-sm font-semibold mb-4 shadow-sm">✨ Cuidado con empatía ✨</div>
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-stone-800 leading-tight">Habla con el ❤️<br/>Cuida en <span class="text-amber-700">Inglés</span></h1>
                <p class="text-lg md:text-xl text-stone-600 mt-4 max-w-xl">Frases reales, vocabulario esencial y expresiones cálidas para el cuidado diario de adultos mayores. Aprende como en una app premium.</p>
                <button id="startHeroBtn" class="mt-8 bg-amber-700 hover:bg-amber-800 text-white text-lg font-semibold px-8 py-4 rounded-2xl shadow-xl transition-all flex items-center gap-2 mx-auto md:mx-0"><i class="fas fa-play"></i> Comenzar ahora</button>
              </div>
              <div class="flex-1 flex justify-center">
                <div class="relative w-64 h-64 md:w-80 md:h-80 bg-gradient-to-tr from-[#e9cfb0] to-[#dbbd97] rounded-full flex items-center justify-center shadow-2xl">
                  <span class="text-8xl">👵🏽🤝👩🏽‍⚕️</span>
                  <div class="absolute -bottom-4 -right-4 bg-white rounded-full p-3 shadow-lg"><span class="text-3xl">💬</span></div>
                  <div class="absolute -top-5 -left-2 bg-amber-100 rounded-full p-2 shadow"><span class="text-xl">🧘🏽‍♀️</span></div>
                </div>
              </div>
            </div>
          </div>
          <div class="h-2 bg-gradient-to-r from-transparent via-amber-300 to-transparent"></div>
        </header>
        
        <!-- Sección principal de la app -->
        <section id="learning-app" class="container mx-auto px-4 py-12 md:py-16">
          <div class="max-w-4xl mx-auto">
            <div class="bg-white/70 backdrop-blur-sm rounded-3xl shadow-2xl border border-white/50 p-5 md:p-8">
              <!-- Barra de estado premium -->
              <div class="flex flex-wrap justify-between items-center gap-4 mb-6 pb-3 border-b border-amber-200">
                <div class="flex items-center gap-4">
                  <div class="bg-amber-100 rounded-2xl px-4 py-2 shadow-inner flex items-center gap-2">
                    <i class="fas fa-trophy text-amber-600"></i>
                    <span class="font-bold text-amber-800">Puntaje</span>
                    <span id="scoreValue" class="text-2xl font-black text-amber-900">0</span>
                  </div>
                  <div id="heartsContainer" class="flex gap-1 bg-rose-50 px-4 py-2 rounded-2xl items-center"></div>
                </div>
                <div class="flex-1 max-w-xs">
                  <div class="flex justify-between text-sm font-medium text-stone-600 mb-1"><span>Progreso</span><span id="progressPercent">0</span>%</div>
                  <div class="h-2.5 w-full bg-amber-100 rounded-full overflow-hidden"><div id="progressFill" class="h-full bg-amber-600 rounded-full transition-all duration-300" style="width:0%"></div></div>
                </div>
              </div>
              
              <!-- Tarjeta de ejercicio actual -->
              <div class="bg-white rounded-3xl shadow-xl p-6 md:p-10">
                <div id="questionDisplay" class="mb-6"></div>
                <div id="optionsContainer" class="space-y-3"></div>
                <div id="feedbackMessage" class="hidden"></div>
                <div class="mt-8 flex justify-end">
                  <button id="nextButton" class="px-8 py-3 rounded-xl font-bold text-white text-lg transition-all bg-gray-300 cursor-not-allowed" disabled>Siguiente ejercicio →</button>
                </div>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Sección de frases destacadas e ilustraciones -->
        <section class="container mx-auto px-4 py-16 bg-white/40 rounded-3xl my-6">
          <div class="max-w-6xl mx-auto text-center">
            <h2 class="text-3xl md:text-4xl font-bold text-stone-800 mb-8">Frases que sanan y acompañan 💛</h2>
            <div class="grid md:grid-cols-3 gap-8">
              <div class="bg-white rounded-2xl p-6 shadow-md border border-amber-100 hover:shadow-xl transition"><i class="fas fa-tint text-4xl text-sky-600 mb-3"></i><h3 class="font-bold text-xl">Hidratación</h3><p class="text-stone-600">“Would you like some water?”<br/>“Let’s drink together.”</p></div>
              <div class="bg-white rounded-2xl p-6 shadow-md border border-amber-100 hover:shadow-xl transition"><i class="fas fa-walking text-4xl text-emerald-600 mb-3"></i><h3 class="font-bold text-xl">Movilidad</h3><p class="text-stone-600">“Take my arm, we walk slowly.”<br/>“I’m here to support you.”</p></div>
              <div class="bg-white rounded-2xl p-6 shadow-md border border-amber-100 hover:shadow-xl transition"><i class="fas fa-pills text-4xl text-rose-500 mb-3"></i><h3 class="font-bold text-xl">Medicina</h3><p class="text-stone-600">“Time for your medication.”<br/>“May I bring your pills?”</p></div>
              <div class="bg-white rounded-2xl p-6 shadow-md border border-amber-100 hover:shadow-xl transition"><i class="fas fa-heartbeat text-4xl text-red-400 mb-3"></i><h3 class="font-bold text-xl">Apoyo emocional</h3><p class="text-stone-600">“You are safe with me.”<br/>“I understand how you feel.”</p></div>
              <div class="bg-white rounded-2xl p-6 shadow-md border border-amber-100 hover:shadow-xl transition"><i class="fas fa-utensils text-4xl text-amber-600 mb-3"></i><h3 class="font-bold text-xl">Alimentación</h3><p class="text-stone-600">“Would you like more soup?”<br/>“Eat slowly, no rush.”</p></div>
              <div class="bg-white rounded-2xl p-6 shadow-md border border-amber-100 hover:shadow-xl transition"><i class="fas fa-bed text-4xl text-indigo-400 mb-3"></i><h3 class="font-bold text-xl">Descanso</h3><p class="text-stone-600">“Rest well, I’ll be near.”<br/>“Let me adjust your pillow.”</p></div>
            </div>
          </div>
        </section>
        
        <footer class="bg-stone-800 text-amber-100 py-8 mt-8 rounded-t-3xl">
          <div class="container mx-auto text-center"><p>✨ ElderCare English — Cuidar con palabras, sanar con presencia ✨</p><p class="text-sm opacity-70 mt-1">Vocabulario práctico para profesionales del cuidado del adulto mayor.</p></div>
        </footer>
      `;
      
      // Conectar referencias
      scoreSpan = document.getElementById('scoreValue');
      heartsContainer = document.getElementById('heartsContainer');
      progressFill = document.getElementById('progressFill');
      questionEl = document.getElementById('questionDisplay');
      optionsContainer = document.getElementById('optionsContainer');
      nextBtn = document.getElementById('nextButton');
      feedbackEl = document.getElementById('feedbackMessage');
      
      if (nextBtn) nextBtn.addEventListener('click', nextExercise);
      const startBtn = document.getElementById('startHeroBtn');
      if (startBtn) startBtn.addEventListener('click', () => document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' }));
      
      // inicializar estado
      currentIndex = 0;
      totalScore = 0;
      lives = 5;
      answered = false;
      selectedOptionIdx = null;
      feedbackMsg = null;
      updateUIState();
      renderCurrentExercise();
    }
    
    // Inicializar
    buildFullUI();
  </script>
</body>
</html>
