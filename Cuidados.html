<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FinanceEnglish | Credit & Accounting - Interactive Exercises</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%); }
    .option-btn { transition: all 0.2s; }
    .option-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
    .true-btn, .false-btn { transition: all 0.2s; }
    .true-btn:hover:not(:disabled), .false-btn:hover:not(:disabled) { transform: translateY(-3px); }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .feedback-animation { animation: fadeSlide 0.3s ease forwards; }
    .heart-pulse { animation: pulse 0.4s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .short-input { transition: all 0.2s; }
    .short-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  </style>
</head>
<body>
  <div id="app-root" class="min-h-screen flex flex-col"></div>

  <script>
    // ==============================================================
    // THREE TYPES OF EXERCISES - CREDIT & ACCOUNTING THEME
    // ==============================================================
    
    const EXERCISES = [
      // Multiple Choice Exercises
      { type: "multiple", question: "What does 'credit' mean in accounting?", options: ["Money going out of an account", "Money coming into an account", "A type of loan"], correct: 0, explanation: "In accounting, a credit increases liability or equity accounts and decreases asset accounts." },
      { type: "multiple", question: "What is a 'ledger'?", options: ["A type of calculator", "A book where financial transactions are recorded", "A bank statement"], correct: 1, explanation: "A ledger is the principal book for recording accounting transactions." },
      { type: "multiple", question: "What are 'accounts receivable'?", options: ["Money the company owes to suppliers", "Money owed to the company by customers", "Cash in the bank"], correct: 1, explanation: "Accounts receivable are payments due from customers for goods or services." },
      { type: "multiple", question: "What does 'APR' stand for?", options: ["Annual Payment Rate", "Annual Percentage Rate", "Account Payment Ratio"], correct: 1, explanation: "APR is the annual interest rate charged for borrowing or earned through investment." },
      
      // True/False Exercises
      { type: "truefalse", question: "Assets = Liabilities + Equity is the basic accounting equation.", correct: "true", explanation: "Correct! This is the fundamental accounting equation that must always balance." },
      { type: "truefalse", question: "Depreciation increases the value of an asset over time.", correct: "false", explanation: "False! Depreciation decreases the value of an asset over its useful life." },
      { type: "truefalse", question: "Accounts payable represent money owed to suppliers.", correct: "true", explanation: "Correct! Accounts payable are short-term debts owed to suppliers and creditors." },
      { type: "truefalse", question: "Net profit is total revenue before any expenses are deducted.", correct: "false", explanation: "False! Net profit is revenue minus all expenses, taxes, and costs." },
      
      // Short Answer Exercises
      { type: "short", question: "What is the term for money that customers owe to a business?", correctKeywords: ["accounts receivable", "receivable", "account receivable"], explanation: "Accounts receivable represents money owed to a business by its customers." },
      { type: "short", question: "What does 'APR' stand for? (write the full term)", correctKeywords: ["annual percentage rate", "annual percentage", "apr"], explanation: "APR stands for Annual Percentage Rate, the annual interest rate for borrowing." },
      { type: "short", question: "What financial statement shows assets, liabilities, and equity?", correctKeywords: ["balance sheet", "balance", "sheet"], explanation: "The balance sheet provides a snapshot of a company's financial position at a point in time." },
      { type: "short", question: "What is the term for the decrease in asset value over time?", correctKeywords: ["depreciation", "depreciate"], explanation: "Depreciation is the systematic allocation of an asset's cost over its useful life." }
    ];

    const TOTAL_EXERCISES = EXERCISES.length;
    const POINTS_PER_CORRECT = 10;

    let currentIndex = 0;
    let totalScore = 0;
    let lives = 5;
    let answered = false;
    let selectedOption = null;
    let shortAnswerValue = "";
    let feedbackMsg = null;
    let feedbackType = null;

    let scoreSpan, heartsContainer, progressFill, progressPercentSpan, questionEl, optionsContainer, nextBtn, feedbackEl;

    function updateUIState() {
      if (scoreSpan) scoreSpan.innerText = totalScore;
      if (progressPercentSpan) progressPercentSpan.innerText = Math.round(((currentIndex) / TOTAL_EXERCISES) * 100);
      if (progressFill) progressFill.style.width = `${((currentIndex) / TOTAL_EXERCISES) * 100}%`;
      if (heartsContainer) {
        heartsContainer.innerHTML = '';
        for (let i = 0; i < 5; i++) {
          const heart = document.createElement('i');
          heart.className = i < lives ? 'fas fa-heart text-red-500 text-2xl mx-0.5' : 'far fa-heart text-gray-400 text-2xl mx-0.5';
          heartsContainer.appendChild(heart);
        }
      }
    }

    function checkShortAnswer() {
      if (answered) return;
      const input = document.getElementById("shortInput");
      if (!input) return;
      const userAnswer = input.value.trim().toLowerCase();
      const exercise = EXERCISES[currentIndex];
      const isCorrect = exercise.correctKeywords.some(keyword => userAnswer.includes(keyword.toLowerCase()));
      
      selectedOption = userAnswer;
      answered = true;
      
      if (isCorrect) {
        totalScore += POINTS_PER_CORRECT;
        feedbackType = 'correct';
        feedbackMsg = `✅ Excellent! +${POINTS_PER_CORRECT} points. ${exercise.explanation}`;
      } else {
        if (lives > 0) lives--;
        if (heartsContainer) heartsContainer.classList.add('heart-pulse');
        setTimeout(() => heartsContainer?.classList.remove('heart-pulse'), 400);
        feedbackType = 'wrong';
        const expected = exercise.correctKeywords[0];
        feedbackMsg = `❌ Incorrect. Expected: "${expected}". ${exercise.explanation}`;
      }
      updateUIState();
      renderCurrentExercise();
      showFeedback();
      
      if (lives === 0) {
        setTimeout(() => {
          if (confirm("No hearts left. Would you like to restart?")) resetGame();
        }, 150);
      }
    }

    function handleMultipleChoice(selectedIdx) {
      if (answered) return;
      const exercise = EXERCISES[currentIndex];
      const isCorrect = (selectedIdx === exercise.correct);
      selectedOption = selectedIdx;
      answered = true;
      
      if (isCorrect) {
        totalScore += POINTS_PER_CORRECT;
        feedbackType = 'correct';
        feedbackMsg = `✅ Excellent! +${POINTS_PER_CORRECT} points. ${exercise.explanation}`;
      } else {
        if (lives > 0) lives--;
        if (heartsContainer) heartsContainer.classList.add('heart-pulse');
        setTimeout(() => heartsContainer?.classList.remove('heart-pulse'), 400);
        feedbackType = 'wrong';
        const correctAnswer = exercise.options[exercise.correct];
        feedbackMsg = `❌ Incorrect. Correct answer: "${correctAnswer}". ${exercise.explanation}`;
      }
      updateUIState();
      renderCurrentExercise();
      showFeedback();
      
      if (lives === 0) {
        setTimeout(() => {
          if (confirm("No hearts left. Would you like to restart?")) resetGame();
        }, 150);
      }
    }

    function handleTrueFalse(selected) {
      if (answered) return;
      const exercise = EXERCISES[currentIndex];
      const isCorrect = (selected === exercise.correct);
      selectedOption = selected;
      answered = true;
      
      if (isCorrect) {
        totalScore += POINTS_PER_CORRECT;
        feedbackType = 'correct';
        feedbackMsg = `✅ Excellent! +${POINTS_PER_CORRECT} points. ${exercise.explanation}`;
      } else {
        if (lives > 0) lives--;
        if (heartsContainer) heartsContainer.classList.add('heart-pulse');
        setTimeout(() => heartsContainer?.classList.remove('heart-pulse'), 400);
        feedbackType = 'wrong';
        feedbackMsg = `❌ Incorrect. The correct answer is "${exercise.correct}". ${exercise.explanation}`;
      }
      updateUIState();
      renderCurrentExercise();
      showFeedback();
      
      if (lives === 0) {
        setTimeout(() => {
          if (confirm("No hearts left. Would you like to restart?")) resetGame();
        }, 150);
      }
    }

    function renderCurrentExercise() {
      if (!questionEl || !optionsContainer) return;
      const exercise = EXERCISES[currentIndex];
      if (!exercise) return;
      
      questionEl.innerHTML = `<div class="text-2xl md:text-3xl font-bold text-stone-800">${exercise.question}</div>`;
      optionsContainer.innerHTML = '';
      
      if (exercise.type === "multiple") {
        exercise.options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = `option-btn w-full text-left p-5 rounded-2xl border-2 transition-all duration-150 flex items-center gap-3 ${!answered ? 'hover:shadow-md cursor-pointer' : 'cursor-default'} bg-white border-blue-200`;
          
          if (answered) {
            if (idx === exercise.correct) btn.className += ' bg-emerald-50 border-emerald-400 ring-1 ring-emerald-200';
            else if (idx === selectedOption && idx !== exercise.correct) btn.className += ' bg-rose-50 border-rose-300';
            else btn.className += ' bg-white/70';
          }
          
          const prefix = document.createElement('span');
          prefix.className = 'w-7 h-7 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-medium text-sm';
          prefix.innerText = String.fromCharCode(65+idx);
          
          const textSpan = document.createElement('span');
          textSpan.className = 'text-stone-700 text-lg font-medium flex-1';
          textSpan.innerText = opt;
          
          btn.appendChild(prefix);
          btn.appendChild(textSpan);
          
          if (answered && idx === exercise.correct) {
            const check = document.createElement('span');
            check.className = 'text-emerald-600 text-xl ml-1';
            check.innerHTML = '✓';
            btn.appendChild(check);
          } else if (answered && idx === selectedOption && idx !== exercise.correct) {
            const cross = document.createElement('span');
            cross.className = 'text-rose-500 text-xl ml-1';
            cross.innerHTML = '✗';
            btn.appendChild(cross);
          }
          
          if (!answered) {
            btn.addEventListener('click', () => handleMultipleChoice(idx));
          }
          optionsContainer.appendChild(btn);
        });
      } 
      else if (exercise.type === "truefalse") {
        const trueBtn = document.createElement('button');
        trueBtn.className = `true-btn w-full p-5 rounded-2xl border-2 transition-all duration-150 flex items-center justify-center gap-3 text-xl font-bold ${!answered ? 'hover:shadow-md cursor-pointer' : 'cursor-default'} bg-white border-green-400 text-green-700`;
        trueBtn.innerHTML = '<i class="fas fa-check-circle mr-2"></i> TRUE';
        
        const falseBtn = document.createElement('button');
        falseBtn.className = `false-btn w-full p-5 rounded-2xl border-2 transition-all duration-150 flex items-center justify-center gap-3 text-xl font-bold ${!answered ? 'hover:shadow-md cursor-pointer' : 'cursor-default'} bg-white border-red-400 text-red-700`;
        falseBtn.innerHTML = '<i class="fas fa-times-circle mr-2"></i> FALSE';
        
        if (answered) {
          if (exercise.correct === "true") trueBtn.className += ' bg-emerald-50 border-emerald-500 ring-1 ring-emerald-200';
          else falseBtn.className += ' bg-emerald-50 border-emerald-500 ring-1 ring-emerald-200';
          
          if (selectedOption === "true" && exercise.correct !== "true") trueBtn.className += ' bg-rose-50 border-rose-400';
          if (selectedOption === "false" && exercise.correct !== "false") falseBtn.className += ' bg-rose-50 border-rose-400';
        }
        
        if (!answered) {
          trueBtn.addEventListener('click', () => handleTrueFalse("true"));
          falseBtn.addEventListener('click', () => handleTrueFalse("false"));
        }
        
        const btnContainer = document.createElement('div');
        btnContainer.className = 'grid grid-cols-2 gap-4';
        btnContainer.appendChild(trueBtn);
        btnContainer.appendChild(falseBtn);
        optionsContainer.appendChild(btnContainer);
      }
      else if (exercise.type === "short") {
        const inputGroup = document.createElement('div');
        inputGroup.className = 'space-y-4';
        
        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'shortInput';
        input.placeholder = 'Type your answer here...';
        input.className = 'short-input w-full p-5 rounded-2xl border-2 border-blue-200 text-lg focus:outline-none focus:border-blue-500 bg-white';
        input.disabled = answered;
        if (answered && selectedOption) input.value = selectedOption;
        
        const submitBtn = document.createElement('button');
        submitBtn.textContent = 'Submit Answer';
        submitBtn.className = 'w-full p-4 rounded-2xl font-bold text-white text-lg bg-blue-600 hover:bg-blue-700 transition';
        submitBtn.disabled = answered;
        
        if (!answered) {
          submitBtn.addEventListener('click', checkShortAnswer);
        }
        
        inputGroup.appendChild(input);
        inputGroup.appendChild(submitBtn);
        optionsContainer.appendChild(inputGroup);
      }
      
      if (nextBtn) {
        if (answered) {
          nextBtn.disabled = false;
          nextBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.add('bg-blue-700', 'hover:bg-blue-800', 'cursor-pointer');
        } else {
          nextBtn.disabled = true;
          nextBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.remove('bg-blue-700', 'hover:bg-blue-800');
        }
      }
    }

    function showFeedback() {
      if (!feedbackEl) return;
      if (!feedbackMsg) { feedbackEl.classList.add('hidden'); return; }
      feedbackEl.classList.remove('hidden');
      const bgClass = feedbackType === 'correct' ? 'bg-emerald-100 border-l-8 border-emerald-500 text-emerald-800' : 'bg-rose-100 border-l-8 border-rose-400 text-rose-800';
      feedbackEl.className = `feedback-animation p-4 rounded-xl ${bgClass} mt-6`;
      feedbackEl.innerHTML = `<p class="font-medium">${feedbackMsg}</p>`;
    }

    function nextExercise() {
      if (!answered) return;
      if (lives === 0) {
        if (confirm("No lives left. Restart to continue?")) resetGame();
        return;
      }
      if (currentIndex + 1 < TOTAL_EXERCISES) {
        currentIndex++;
        answered = false;
        selectedOption = null;
        shortAnswerValue = "";
        feedbackMsg = null;
        feedbackType = null;
        if (feedbackEl) feedbackEl.classList.add('hidden');
        renderCurrentExercise();
        updateUIState();
      } else {
        answered = true;
        feedbackMsg = `🎉 CONGRATULATIONS! You completed all exercises! Final score: ${totalScore} / ${TOTAL_EXERCISES * POINTS_PER_CORRECT}. You're mastering financial English! 🌟`;
        feedbackType = 'complete';
        showFeedback();
        if (nextBtn) nextBtn.disabled = true;
        optionsContainer.innerHTML = `<div class="text-center p-8 bg-blue-50 rounded-2xl"><i class="fas fa-trophy text-6xl text-blue-500 mb-3"></i><p class="text-xl font-bold">✨ All Exercises Complete! ✨</p><p class="text-stone-600 mt-2">You've practiced Multiple Choice, True/False, and Short Answer questions.</p><button id="resetFinalBtn" class="mt-6 bg-blue-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-800">Restart Practice</button></div>`;
        document.getElementById('resetFinalBtn')?.addEventListener('click', () => resetGame());
      }
    }

    function resetGame() {
      currentIndex = 0;
      totalScore = 0;
      lives = 5;
      answered = false;
      selectedOption = null;
      shortAnswerValue = "";
      feedbackMsg = null;
      feedbackType = null;
      if (feedbackEl) feedbackEl.classList.add('hidden');
      updateUIState();
      renderCurrentExercise();
      document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' });
    }

    function buildFullUI() {
      const root = document.getElementById('app-root');
      if (!root) return;
      
      root.innerHTML = `
        <header class="relative bg-gradient-to-br from-[#e0e7ff] to-[#c7d2fe] overflow-hidden shadow-md">
          <div class="container mx-auto px-5 py-10 md:py-14">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
              <div class="flex-1 text-center md:text-left">
                <div class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-white/60 backdrop-blur-sm text-blue-800 text-sm font-semibold mb-4"><i class="fas fa-graduation-cap"></i> Three Exercise Types</div>
                <h1 class="text-4xl md:text-6xl font-extrabold text-stone-800 leading-tight">Master <span class="text-blue-700">Financial</span><br/>English for Credit & Accounting</h1>
                <p class="text-lg text-stone-600 mt-4 max-w-xl">Practice with Multiple Choice, True/False, and Short Answer questions. Each correct answer gives +10 points. Watch your hearts!</p>
                <button id="startHeroBtn" class="mt-8 bg-blue-700 hover:bg-blue-800 text-white font-semibold px-8 py-4 rounded-2xl shadow-xl transition"><i class="fas fa-play mr-2"></i> Start Practice</button>
              </div>
              <div class="flex-1 flex justify-center">
                <div class="relative w-64 h-64 md:w-80 md:h-80 bg-gradient-to-tr from-[#c7d2fe] to-[#a5b4fc] rounded-full flex items-center justify-center shadow-2xl">
                  <span class="text-8xl">📚💼</span>
                  <div class="absolute -bottom-4 -right-4 bg-white rounded-full p-3 shadow-lg"><i class="fas fa-check-circle text-3xl text-blue-600"></i></div>
                </div>
              </div>
            </div>
          </div>
        </header>
        
        <section id="learning-app" class="container mx-auto px-4 py-12">
          <div class="max-w-4xl mx-auto">
            <div class="bg-white/70 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-8">
              <div class="flex flex-wrap justify-between items-center gap-4 mb-6 border-b border-blue-200 pb-3">
                <div class="flex items-center gap-4">
                  <div class="bg-blue-100 rounded-2xl px-4 py-2 shadow-inner"><i class="fas fa-trophy text-blue-600"></i> <span class="font-bold ml-1">Score</span> <span id="scoreValue" class="text-2xl font-black ml-2">0</span></div>
                  <div id="heartsContainer" class="flex gap-1 bg-rose-50 px-4 py-2 rounded-2xl"></div>
                </div>
                <div class="flex-1 max-w-xs">
                  <div class="flex justify-between text-sm font-medium text-stone-600 mb-1"><span>Progress</span><span id="progressPercent">0</span>%</div>
                  <div class="h-2.5 bg-blue-100 rounded-full overflow-hidden"><div id="progressFill" class="h-full bg-blue-600 rounded-full transition-all duration-300" style="width:0%"></div></div>
                </div>
              </div>
              <div class="bg-white rounded-3xl shadow-xl p-6 md:p-10">
                <div class="mb-4 inline-block px-3 py-1 rounded-full text-xs font-semibold" id="exerciseTypeBadge"></div>
                <div id="questionDisplay" class="mb-6"></div>
                <div id="optionsContainer" class="space-y-3"></div>
                <div id="feedbackMessage" class="hidden"></div>
                <div class="mt-8 flex justify-end">
                  <button id="nextButton" class="px-8 py-3 rounded-xl font-bold text-white text-lg transition-all bg-gray-300 cursor-not-allowed" disabled>Next Exercise →</button>
                </div>
              </div>
            </div>
          </div>
        </section>
        
        <section class="container mx-auto px-4 py-12 bg-white/40 rounded-3xl my-6">
          <div class="max-w-6xl mx-auto">
            <div class="text-center mb-10">
              <h2 class="text-3xl md:text-4xl font-bold text-stone-800">Exercise Types Included</h2>
              <p class="text-stone-600 mt-2">Practice with three different formats to master financial English</p>
            </div>
            <div class="grid md:grid-cols-3 gap-6">
              <div class="bg-white rounded-2xl p-6 shadow-md border border-blue-100 text-center">
                <i class="fas fa-list-ul text-4xl text-blue-600 mb-3"></i>
                <h3 class="font-bold text-xl">Multiple Choice</h3>
                <p class="text-stone-600 mt-2">Select the correct answer from several options</p>
              </div>
              <div class="bg-white rounded-2xl p-6 shadow-md border border-blue-100 text-center">
                <i class="fas fa-check-double text-4xl text-blue-600 mb-3"></i>
                <h3 class="font-bold text-xl">True / False</h3>
                <p class="text-stone-600 mt-2">Decide if the statement is correct or incorrect</p>
              </div>
              <div class="bg-white rounded-2xl p-6 shadow-md border border-blue-100 text-center">
                <i class="fas fa-keyboard text-4xl text-blue-600 mb-3"></i>
                <h3 class="font-bold text-xl">Short Answer</h3>
                <p class="text-stone-600 mt-2">Type the correct term or phrase</p>
              </div>
            </div>
          </div>
        </section>
        
        <footer class="bg-stone-800 text-blue-100 py-8 mt-8 rounded-t-3xl">
          <div class="container mx-auto text-center">
            <p>✨ FinanceEnglish — Credit & Accounting Vocabulary Practice ✨</p>
            <p class="text-sm opacity-70 mt-1">Three exercise types to master financial English terminology</p>
          </div>
        </footer>
      `;
      
      scoreSpan = document.getElementById('scoreValue');
      heartsContainer = document.getElementById('heartsContainer');
      progressFill = document.getElementById('progressFill');
      progressPercentSpan = document.getElementById('progressPercent');
      questionEl = document.getElementById('questionDisplay');
      optionsContainer = document.getElementById('optionsContainer');
      nextBtn = document.getElementById('nextButton');
      feedbackEl = document.getElementById('feedbackMessage');
      const typeBadge = document.getElementById('exerciseTypeBadge');
      
      if (nextBtn) nextBtn.addEventListener('click', nextExercise);
      document.getElementById('startHeroBtn')?.addEventListener('click', () => document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' }));
      
      function updateTypeBadge() {
        if (typeBadge && EXERCISES[currentIndex]) {
          const type = EXERCISES[currentIndex].type;
          let badgeText = '';
          let badgeColor = '';
          if (type === 'multiple') { badgeText = 'MULTIPLE CHOICE'; badgeColor = 'bg-purple-100 text-purple-700'; }
          else if (type === 'truefalse') { badgeText = 'TRUE / FALSE'; badgeColor = 'bg-green-100 text-green-700'; }
          else { badgeText = 'SHORT ANSWER'; badgeColor = 'bg-orange-100 text-orange-700'; }
          typeBadge.textContent = badgeText;
          typeBadge.className = `inline-block px-3 py-1 rounded-full text-xs font-semibold ${badgeColor}`;
        }
      }
      
      currentIndex = 0; totalScore = 0; lives = 5; answered = false; selectedOption = null;
      updateUIState();
      renderCurrentExercise();
      updateTypeBadge();
      
      // Override render to update badge
      const originalRender = renderCurrentExercise;
      window.renderCurrentExercise = function() {
        originalRender();
        updateTypeBadge();
      };
      renderCurrentExercise = window.renderCurrentExercise;
    }
    
    buildFullUI();
  </script>
</body>
</html>
