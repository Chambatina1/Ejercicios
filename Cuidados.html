<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>English for Elderly Care</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .exercise {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .question {
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .result {
      margin-top: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>🩺 English Practice: Elderly Care</h1>

<div id="app"></div>

<script>
const exercises = [
  {
    question: "How do you ask if the patient is in pain?",
    answer: "Are you in pain?"
  },
  {
    question: "How do you offer help walking?",
    answer: "Do you need help walking?"
  },
  {
    question: "Say this: 'Voy a ayudarte a levantarte'",
    answer: "I will help you stand up"
  },
  {
    question: "How do you ask if they took their medicine?",
    answer: "Did you take your medicine?"
  },
  {
    question: "Say: 'Es hora de comer'",
    answer: "It is time to eat"
  },
  {
    question: "How do you ask if they feel dizzy?",
    answer: "Do you feel dizzy?"
  },
  {
    question: "Say: 'Voy a cambiar tu posición'",
    answer: "I will change your position"
  },
  {
    question: "How do you ask if they are comfortable?",
    answer: "Are you comfortable?"
  },
  {
    question: "Say: 'Voy a revisar tu presión'",
    answer: "I will check your blood pressure"
  },
  {
    question: "How do you reassure them?",
    answer: "Everything is okay"
  }
];

const app = document.getElementById("app");

exercises.forEach((ex, index) => {
  const div = document.createElement("div");
  div.className = "exercise";

  div.innerHTML = `
    <div class="question">${index + 1}. ${ex.question}</div>
    <input type="text" id="input-${index}" placeholder="Your answer...">
    <button onclick="checkAnswer(${index})">Check</button>
    <div class="result" id="result-${index}"></div>
  `;

  app.appendChild(div);
});

function checkAnswer(index) {
  const userInput = document.getElementById(`input-${index}`).value.toLowerCase().trim();
  const correct = exercises[index].answer.toLowerCase();

  const resultDiv = document.getElementById(`result-${index}`);

  if (userInput === correct) {
    resultDiv.textContent = "✅ Correct!";
    resultDiv.style.color = "green";
  } else {
    resultDiv.textContent = `❌ Correct answer: "${exercises[index].answer}"`;
    resultDiv.style.color = "red";
  }
}
</script>

</body>
</html>
