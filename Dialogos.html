<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ElderCare English | Inglés Americano Profesional</title>
  <!-- Tailwind CSS + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #fef7e8 0%, #fff3e0 100%); }
    .option-btn { transition: all 0.2s; }
    .option-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .feedback-animation { animation: fadeSlide 0.3s ease forwards; }
    .heart-pulse { animation: pulse 0.4s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .audio-btn, .audio-dialog-btn { transition: all 0.15s; }
    .audio-btn:hover, .audio-dialog-btn:hover { transform: scale(1.05); background-color: #fde68a; }
    .playing { animation: pulse 0.6s ease; background-color: #fbbf24 !important; }
  </style>
</head>
<body>
  <div id="app-root" class="min-h-screen flex flex-col"></div>

  <script>
    // --------------------------------------------------------------
    // EJERCICIOS (Enfoque en diálogos y comprensión auditiva)
    // --------------------------------------------------------------
    const EXERCISES = [
      { type: "multiple", question: "🧓🏽 Escucha la frase (usa el botón de audio). ¿Qué significa 'Let me help you sit up slowly'?", options: ["Déjame ayudarte a comer", "Déjame ayudarte a incorporarte lentamente", "Déjame traerte agua"], correct: 1, explanation: "✔️ 'Sit up slowly' = incorporarse lentamente. Movilidad segura." },
      { type: "multiple", question: "Para preguntar si necesita ir al baño de forma respetuosa, la mejor frase es:", options: ["Do you need to go to the bathroom?", "Would you like me to assist you to the restroom?", "Let's go to the toilet"], correct: 1, explanation: "✅ 'Would you like me to assist you...' es la más educada y profesional." },
      { type: "fill", question: "Completa la frase del cuidador: '______ I check your temperature?' (¿Puedo revisar tu temperatura?)", options: ["May", "Must", "Should"], correct: 0, explanation: "🔹 'May I...' es formal, cálido y respetuoso." },
      { type: "multiple", question: "Escucha: 'I'll bring you a warm blanket and some tea.' ¿Qué está ofreciendo el cuidador?", options: ["Medicina y comida", "Manta caliente y té", "Ayuda para caminar"], correct: 1, explanation: "🧣 Manta caliente + té = confort y calidez." },
      { type: "translate", question: "Traduce al inglés con tono suave: '¿Necesita algo para el dolor?'", options: ["Do you need pain?", "Do you need anything for the pain?", "Pain medicine?"], correct: 1, explanation: "💙 'Do you need anything for the pain?' es completo y empático." },
      { type: "multiple", question: "Diálogo: Cuidador: 'It's time for your medication.' Paciente: 'I don't want to take it.' Mejor respuesta:", options: ["You have to take it now", "I understand you don't want to. Would you like me to stay with you while you take it?", "Fine, skip it then"], correct: 1, explanation: "🌟 Validar sentimientos y ofrecer compañía es la mejor práctica geriátrica." }
    ];

    // --------------------------------------------------------------
    // DIÁLOGOS COMPLETOS (SOLO INGLÉS, con traducción para apoyo)
    // --------------------------------------------------------------
    const DIALOGUES = [
      { role: "caregiver", text: "Good morning, Mrs. Johnson. How did you sleep last night?", translation: "Buenos días, Sra. Johnson. ¿Cómo durmió anoche?" },
      { role: "patient", text: "Good morning, dear. I slept a little, but I had some beautiful dreams.", translation: "Buenos días, querido/a. Dormí un poco, pero tuve sueños hermosos." },
      { role: "caregiver", text: "That's wonderful. Would you like some warm water before breakfast?", translation: "Eso es maravilloso. ¿Le gustaría un poco de agua tibia antes del desayuno?" },
      { role: "patient", text: "Yes, please. You are always so thoughtful. Thank you.", translation: "Sí, por favor. Siempre eres tan atento/a. Gracias." },
      { role: "caregiver", text: "Of course. I'm here to make sure you feel comfortable and safe.", translation: "Por supuesto. Estoy aquí para asegurarme de que se sienta cómodo/a y seguro/a." },
      { role: "caregiver", text: "Let me help you sit up slowly. Take your time, there's no rush.", translation: "Déjeme ayudarle a incorporarse lentamente. Tómese su tiempo, no hay prisa." },
      { role: "patient", text: "You are very patient with me. I really appreciate your kindness.", translation: "Usted es muy paciente conmigo. Realmente aprecio su amabilidad." },
      { role: "caregiver", text: "It's my pleasure. Now, are you ready for your medication?", translation: "Es un placer. Ahora, ¿está listo/a para su medicamento?" },
      { role: "patient", text: "Yes, I'll take it with your help. Thank you for being here.", translation: "Sí, lo tomaré con su ayuda. Gracias por estar aquí." }
    ];

    const TOTAL_EXERCISES = EXERCISES.length;
    const POINTS_PER_CORRECT = 10;

    // Estado global
    let currentIndex = 0;
    let totalScore = 0;
    let lives = 5;
    let answered = false;
    let selectedOptionIdx = null;
    let feedbackMsg = null;
    let feedbackType = null;

    // Elementos DOM
    let scoreSpan, heartsContainer, progressFill, progressPercentSpan, questionEl, optionsContainer, nextBtn, feedbackEl;

    // --------------------------------------------------------------
    // SISTEMA DE AUDIO - INGLÉS AMERICANO PURO
    // --------------------------------------------------------------
    let selectedVoice = null;
    let voiceReady = false;

    async function loadAmericanVoice() {
      return new Promise((resolve) => {
        if (!window.speechSynthesis) {
          console.warn("SpeechSynthesis no soportado");
          resolve(false);
          return;
        }

        const checkVoices = () => {
          const voices = window.speechSynthesis.getVoices();
          console.log("Voces disponibles:", voices.map(v => `${v.name} (${v.lang})`));
          
          // Prioridad: Google US English, luego voces nativas de Windows/Mac en inglés americano
          let americanVoice = voices.find(voice => 
            voice.lang === 'en-US' && (voice.name.includes('Google') || voice.name.includes('Natural') || voice.name.includes('Premium'))
          );
          
          if (!americanVoice) {
            americanVoice = voices.find(voice => 
              voice.lang === 'en-US' && (voice.name.includes('Samantha') || voice.name.includes('Alex') || voice.name.includes('Microsoft David') || voice.name.includes('Microsoft Zira'))
            );
          }
          
          if (!americanVoice) {
            americanVoice = voices.find(voice => voice.lang === 'en-US');
          }
          
          if (americanVoice) {
            selectedVoice = americanVoice;
            voiceReady = true;
            console.log(`✅ Voz seleccionada: ${selectedVoice.name} (${selectedVoice.lang}) - INGLÉS AMERICANO`);
            // Mostrar mensaje en consola para debug
            const statusDiv = document.getElementById('audioStatus');
            if (statusDiv) statusDiv.innerHTML = `<span class="text-green-700"><i class="fas fa-check-circle"></i> Audio listo: ${selectedVoice.name}</span>`;
          } else {
            console.warn("No se encontró voz en inglés americano. Revisa la configuración de tu navegador.");
            voiceReady = false;
            const statusDiv = document.getElementById('audioStatus');
            if (statusDiv) statusDiv.innerHTML = `<span class="text-red-600"><i class="fas fa-exclamation-triangle"></i> No se detectó voz en inglés. Asegúrate de usar Chrome/Edge.</span>`;
          }
          resolve(voiceReady);
        };

        if (window.speechSynthesis.getVoices().length > 0) {
          checkVoices();
        } else {
          window.speechSynthesis.onvoiceschanged = checkVoices;
          setTimeout(checkVoices, 1000);
        }
      });
    }

    async function speakEnglish(text, element = null) {
      if (!window.speechSynthesis) {
        alert("Tu navegador no soporta audio. Usa Chrome, Edge o Safari.");
        return;
      }

      if (!voiceReady || !selectedVoice) {
        await loadAmericanVoice();
        if (!voiceReady || !selectedVoice) {
          alert("⚠️ No se pudo cargar la voz en inglés. Por favor, asegúrate de usar Chrome o Edge y recarga la página.");
          return;
        }
      }

      // Cancelar cualquier audio en reproducción
      window.speechSynthesis.cancel();

      // Pequeño delay para evitar conflictos
      setTimeout(() => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';      // Forzar idioma
        utterance.voice = selectedVoice; // Usar la voz seleccionada
        utterance.rate = 0.85;          // Velocidad clara y natural
        utterance.pitch = 1.0;
        utterance.volume = 1;
        
        console.log(`🔊 Reproduciendo: "${text}" con voz: ${selectedVoice.name}`);

        if (element) {
          element.classList.add('playing');
          utterance.onend = () => element.classList.remove('playing');
          utterance.onerror = () => element.classList.remove('playing');
        }
        
        window.speechSynthesis.speak(utterance);
      }, 50);
    }

    // Cargar voces al inicio
    loadAmericanVoice();

    function updateUIState() {
      if (scoreSpan) scoreSpan.innerText = totalScore;
      if (progressPercentSpan) progressPercentSpan.innerText = Math.round((currentIndex / TOTAL_EXERCISES) * 100);
      if (progressFill) progressFill.style.width = `${(currentIndex / TOTAL_EXERCISES) * 100}%`;
      if (heartsContainer) {
        heartsContainer.innerHTML = '';
        for (let i = 0; i < 5; i++) {
          const heart = document.createElement('i');
          heart.className = i < lives ? 'fas fa-heart text-red-500 text-2xl mx-0.5' : 'far fa-heart text-gray-400 text-2xl mx-0.5';
          heartsContainer.appendChild(heart);
        }
      }
    }

    function renderCurrentExercise() {
      if (!questionEl || !optionsContainer) return;
      const exercise = EXERCISES[currentIndex];
      if (!exercise) return;
      
      let audioHint = '';
      if (exercise.question.includes("Escucha")) {
        audioHint = `<div class="mb-4 flex items-center gap-3 bg-amber-50 p-3 rounded-xl border border-amber-200"><i class="fas fa-headphones text-amber-600 text-xl"></i> <span class="text-amber-800 font-medium">🎧 Haz clic en el ícono de audio junto a las opciones para escuchar la pronunciación en INGLÉS AMERICANO.</span></div>`;
      }
      questionEl.innerHTML = `<div class="text-2xl md:text-3xl font-bold text-stone-800">${exercise.question}</div>${audioHint}`;
      
      optionsContainer.innerHTML = '';
      exercise.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = `option-btn w-full text-left p-5 rounded-2xl border-2 transition-all duration-150 flex items-center gap-3 ${!answered ? 'hover:shadow-md cursor-pointer' : 'cursor-default'}`;
        
        if (answered) {
          if (idx === exercise.correct) btn.className += ' bg-emerald-50 border-emerald-400 ring-1 ring-emerald-200';
          else if (idx === selectedOptionIdx && idx !== exercise.correct) btn.className += ' bg-rose-50 border-rose-300';
          else btn.className += ' bg-white/70 border-amber-100';
        } else {
          btn.className += ' bg-white border-amber-200';
          if (selectedOptionIdx === idx) btn.className += ' bg-amber-50 border-amber-400';
        }
        
        const prefix = document.createElement('span');
        prefix.className = 'w-7 h-7 rounded-full bg-amber-100 text-amber-800 flex items-center justify-center font-medium text-sm';
        prefix.innerText = String.fromCharCode(65+idx);
        
        const textSpan = document.createElement('span');
        textSpan.className = 'text-stone-700 text-lg font-medium flex-1';
        textSpan.innerText = opt;
        
        btn.appendChild(prefix);
        btn.appendChild(textSpan);
        
        // Botón de audio para escuchar la opción en INGLÉS AMERICANO
        const audioIcon = document.createElement('button');
        audioIcon.className = 'audio-btn ml-2 p-2 rounded-full bg-amber-100 text-amber-700 hover:bg-amber-200 transition flex-shrink-0';
        audioIcon.innerHTML = '<i class="fas fa-volume-up"></i>';
        audioIcon.addEventListener('click', async (e) => {
          e.stopPropagation();
          await speakEnglish(opt, audioIcon);
        });
        btn.appendChild(audioIcon);
        
        if (answered && idx === exercise.correct) {
          const check = document.createElement('span');
          check.className = 'text-emerald-600 text-xl ml-1';
          check.innerHTML = '✓';
          btn.appendChild(check);
        } else if (answered && idx === selectedOptionIdx && idx !== exercise.correct) {
          const cross = document.createElement('span');
          cross.className = 'text-rose-500 text-xl ml-1';
          cross.innerHTML = '✗';
          btn.appendChild(cross);
        }
        
        if (!answered) {
          btn.addEventListener('click', () => handleAnswer(idx));
        }
        optionsContainer.appendChild(btn);
      });
      
      if (nextBtn) {
        if (answered) {
          nextBtn.disabled = false;
          nextBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.add('bg-amber-700', 'hover:bg-amber-800', 'cursor-pointer');
        } else {
          nextBtn.disabled = true;
          nextBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.remove('bg-amber-700', 'hover:bg-amber-800');
        }
      }
    }

    function handleAnswer(selectedIdx) {
      if (answered) return;
      const exercise = EXERCISES[currentIndex];
      const isCorrect = (selectedIdx === exercise.correct);
      selectedOptionIdx = selectedIdx;
      answered = true;
      
      if (isCorrect) {
        totalScore += POINTS_PER_CORRECT;
        feedbackType = 'correct';
        feedbackMsg = `✅ ¡Excelente! +${POINTS_PER_CORRECT} puntos. ${exercise.explanation}`;
      } else {
        if (lives > 0) lives--;
        if (heartsContainer) heartsContainer.classList.add('heart-pulse');
        setTimeout(() => heartsContainer?.classList.remove('heart-pulse'), 400);
        feedbackType = 'wrong';
        feedbackMsg = `❌ Incorrecto. ${exercise.explanation}`;
      }
      updateUIState();
      renderCurrentExercise();
      showFeedback();
      
      if (lives === 0) {
        setTimeout(() => {
          if (confirm("💔 Sin corazones. ¿Quieres reiniciar la práctica para seguir aprendiendo?")) resetGame();
        }, 150);
      }
    }
    
    function showFeedback() {
      if (!feedbackEl) return;
      if (!feedbackMsg) { feedbackEl.classList.add('hidden'); return; }
      feedbackEl.classList.remove('hidden');
      const bgClass = feedbackType === 'correct' ? 'bg-emerald-100 border-l-8 border-emerald-500 text-emerald-800' : 'bg-rose-100 border-l-8 border-rose-400 text-rose-800';
      feedbackEl.className = `feedback-animation p-4 rounded-xl ${bgClass} mt-6`;
      feedbackEl.innerHTML = `<p class="font-medium">${feedbackMsg}</p>`;
    }
    
    function nextExercise() {
      if (!answered) return;
      if (lives === 0) {
        if (confirm("❤️‍🩹 Sin vidas. Reiniciar para seguir practicando.")) resetGame();
        return;
      }
      if (currentIndex + 1 < TOTAL_EXERCISES) {
        currentIndex++;
        answered = false;
        selectedOptionIdx = null;
        feedbackMsg = null;
        feedbackType = null;
        if (feedbackEl) feedbackEl.classList.add('hidden');
        renderCurrentExercise();
        updateUIState();
      } else {
        answered = true;
        feedbackMsg = `🎉 ¡FELICIDADES! Completaste todos los ejercicios. Puntaje final: ${totalScore} / ${TOTAL_EXERCISES * POINTS_PER_CORRECT}. ¡Eres un gran cuidador/a! 🌟 Sigue practicando los diálogos con audio.`;
        feedbackType = 'complete';
        showFeedback();
        if (nextBtn) nextBtn.disabled = true;
        optionsContainer.innerHTML = `<div class="text-center p-8 bg-amber-50 rounded-2xl"><i class="fas fa-trophy text-6xl text-amber-500 mb-3"></i><p class="text-xl font-bold">✨ ¡Módulo completado con éxito! ✨</p><p class="text-stone-600 mt-2">Has mejorado tu inglés para el cuidado geriátrico.</p><button id="resetFinalBtn" class="mt-6 bg-amber-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-amber-800">🔄 Reiniciar práctica</button></div>`;
        document.getElementById('resetFinalBtn')?.addEventListener('click', () => resetGame());
      }
    }
    
    function resetGame() {
      currentIndex = 0;
      totalScore = 0;
      lives = 5;
      answered = false;
      selectedOptionIdx = null;
      feedbackMsg = null;
      feedbackType = null;
      if (feedbackEl) feedbackEl.classList.add('hidden');
      updateUIState();
      renderCurrentExercise();
      document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' });
    }
    
    // Construir página completa
    function buildFullUI() {
      const root = document.getElementById('app-root');
      if (!root) return;
      
      // Generar HTML de diálogos
      let dialoguesHtml = '';
      DIALOGUES.forEach((d, idx) => {
        const bgClass = d.role === 'caregiver' ? 'bg-amber-50 border-l-8 border-amber-400' : 'bg-white border-l-8 border-emerald-300';
        const icon = d.role === 'caregiver' ? '<i class="fas fa-user-nurse text-amber-600"></i>' : '<i class="fas fa-user-friends text-emerald-600"></i>';
        const roleName = d.role === 'caregiver' ? '👩🏽‍⚕️ CUIDADOR/A' : '👵🏽 ADULTO MAYOR';
        dialoguesHtml += `
          <div class="${bgClass} p-5 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-start gap-3 transition hover:shadow-md">
            <div class="flex-1">
              <div class="flex items-center gap-2 font-bold text-stone-700">${icon} <span>${roleName}</span></div>
              <p class="text-xl font-semibold text-stone-800 mt-2">${d.text}</p>
              <p class="text-sm text-stone-500 italic mt-1">📖 ${d.translation}</p>
            </div>
            <button class="audio-dialog-btn bg-amber-200 hover:bg-amber-300 text-amber-900 px-5 py-3 rounded-xl flex items-center gap-2 transition font-medium" data-phrase="${d.text.replace(/['"]/g, '\\"')}">
              <i class="fas fa-volume-up"></i> Escuchar (US 🇺🇸)
            </button>
          </div>
        `;
      });
      
      root.innerHTML = `
        <header class="relative bg-gradient-to-br from-[#f9e7d2] to-[#f7e1c4] overflow-hidden shadow-md">
          <div class="container mx-auto px-5 py-10 md:py-14">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
              <div class="flex-1 text-center md:text-left">
                <div class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-white/60 backdrop-blur-sm text-amber-800 text-sm font-semibold mb-4"><i class="fas fa-microphone-alt"></i> Audio en Inglés Americano 🇺🇸</div>
                <h1 class="text-4xl md:text-6xl font-extrabold text-stone-800 leading-tight">Habla, escucha y <br/>cuida en <span class="text-amber-700">Inglés</span></h1>
                <p class="text-lg text-stone-600 mt-4 max-w-xl">Diálogos reales + pronunciación americana nativa + ejercicios interactivos. Entrena tu oído para un cuidado profesional y cálido.</p>
                <button id="startHeroBtn" class="mt-8 bg-amber-700 hover:bg-amber-800 text-white font-semibold px-8 py-4 rounded-2xl shadow-xl transition"><i class="fas fa-play mr-2"></i> Comenzar práctica</button>
              </div>
              <div class="flex-1 flex justify-center">
                <div class="relative w-64 h-64 md:w-80 md:h-80 bg-gradient-to-tr from-[#e9cfb0] to-[#dbbd97] rounded-full flex items-center justify-center shadow-2xl">
                  <span class="text-8xl">🇺🇸🎙️</span>
                  <div class="absolute -bottom-4 -right-4 bg-white rounded-full p-3 shadow-lg"><i class="fas fa-headphones text-3xl text-amber-600"></i></div>
                </div>
              </div>
            </div>
          </div>
        </header>
        
        <section id="learning-app" class="container mx-auto px-4 py-12">
          <div class="max-w-4xl mx-auto">
            <div class="bg-white/70 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-8">
              <div class="flex flex-wrap justify-between items-center gap-4 mb-6 border-b border-amber-200 pb-3">
                <div class="flex items-center gap-4">
                  <div class="bg-amber-100 rounded-2xl px-4 py-2 shadow-inner"><i class="fas fa-trophy text-amber-600"></i> <span class="font-bold ml-1">Puntaje</span> <span id="scoreValue" class="text-2xl font-black ml-2">0</span></div>
                  <div id="heartsContainer" class="flex gap-1 bg-rose-50 px-4 py-2 rounded-2xl"></div>
                </div>
                <div class="flex-1 max-w-xs">
                  <div class="flex justify-between text-sm font-medium text-stone-600 mb-1"><span>Progreso</span><span id="progressPercent">0</span>%</div>
                  <div class="h-2.5 bg-amber-100 rounded-full overflow-hidden"><div id="progressFill" class="h-full bg-amber-600 rounded-full transition-all duration-300" style="width:0%"></div></div>
                </div>
              </div>
              <div class="bg-white rounded-3xl shadow-xl p-6 md:p-10">
                <div id="questionDisplay" class="mb-6"></div>
                <div id="optionsContainer" class="space-y-3"></div>
                <div id="feedbackMessage" class="hidden"></div>
                <div class="mt-8 flex justify-end">
                  <button id="nextButton" class="px-8 py-3 rounded-xl font-bold text-white text-lg transition-all bg-gray-300 cursor-not-allowed" disabled>Siguiente ejercicio →</button>
                </div>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Sección de Diálogos con Audio Americano -->
        <section class="container mx-auto px-4 py-12">
          <div class="max-w-5xl mx-auto">
            <div class="text-center mb-10">
              <h2 class="text-3xl md:text-4xl font-bold text-stone-800">🗣️ Diálogos Esenciales: Cuidador + Adulto Mayor</h2>
              <p class="text-stone-600 mt-2 text-lg">🇺🇸 <strong>Cada frase se lee en INGLÉS AMERICANO NATIVO</strong> — haz clic en "Escuchar" para oír la pronunciación real.</p>
              <div id="audioStatus" class="mt-3 inline-flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-full text-sm font-medium">
                <i class="fas fa-spinner fa-pulse"></i> Cargando voces...
              </div>
            </div>
            <div class="space-y-5" id="dialoguesList">${dialoguesHtml}</div>
            <div class="mt-8 bg-gradient-to-r from-amber-100 to-amber-50 p-5 rounded-2xl text-center border border-amber-200">
              <i class="fas fa-lightbulb text-amber-600 text-xl mr-2"></i>
              <span class="font-medium">Consejo profesional:</span> Repite cada frase en voz alta después de escucharla. La pronunciación clara genera confianza en el adulto mayor.
            </div>
          </div>
        </section>
        
        <footer class="bg-stone-800 text-amber-100 py-8 mt-8 rounded-t-3xl">
          <div class="container mx-auto text-center">
            <p>✨ ElderCare English — Inglés Americano para Cuidadores Profesionales ✨</p>
            <p class="text-sm opacity-70 mt-1">Mejora tu comunicación y brinda un cuidado excepcional con empatía.</p>
          </div>
        </footer>
      `;
      
      // Asignar referencias
      scoreSpan = document.getElementById('scoreValue');
      heartsContainer = document.getElementById('heartsContainer');
      progressFill = document.getElementById('progressFill');
      progressPercentSpan = document.getElementById('progressPercent');
      questionEl = document.getElementById('questionDisplay');
      optionsContainer = document.getElementById('optionsContainer');
      nextBtn = document.getElementById('nextButton');
      feedbackEl = document.getElementById('feedbackMessage');
      
      if (nextBtn) nextBtn.addEventListener('click', nextExercise);
      document.getElementById('startHeroBtn')?.addEventListener('click', () => document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' }));
      
      // Asignar eventos de audio a los botones de diálogo
      document.querySelectorAll('.audio-dialog-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const phrase = btn.getAttribute('data-phrase');
          if (phrase) {
            await speakEnglish(phrase, btn);
          }
        });
      });
      
      // Inicializar estado
      currentIndex = 0; totalScore = 0; lives = 5; answered = false; selectedOptionIdx = null;
      updateUIState();
      renderCurrentExercise();
      
      // Recargar voces después de un momento para asegurar
      setTimeout(() => loadAmericanVoice(), 500);
    }
    
    buildFullUI();
  </script>
</body>
</html>
