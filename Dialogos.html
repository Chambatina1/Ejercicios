<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ElderCare English | American English for Caregivers</title>
  <!-- Tailwind CSS + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #fef7e8 0%, #fff3e0 100%); }
    .option-btn { transition: all 0.2s; }
    .option-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .feedback-animation { animation: fadeSlide 0.3s ease forwards; }
    .heart-pulse { animation: pulse 0.4s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .audio-btn, .audio-dialog-btn { transition: all 0.15s; }
    .audio-btn:hover:not(:disabled), .audio-dialog-btn:hover { transform: scale(1.05); background-color: #fde68a; }
    .playing { animation: pulse 0.6s ease; background-color: #fbbf24 !important; }
  </style>
</head>
<body>
  <div id="app-root" class="min-h-screen flex flex-col"></div>

  <script>
    // --------------------------------------------------------------
    // EXERCISES - ALL IN ENGLISH (Reading & Listening Practice)
    // --------------------------------------------------------------
    const EXERCISES = [
      { type: "multiple", question: "What is the best way to ask if an elderly person needs help walking?", options: ["Let me carry you", "Would you like me to help you walk?", "You need to walk now"], correct: 1, explanation: "✔️ 'Would you like me to help you walk?' is polite and respectful." },
      { type: "multiple", question: "Choose the most respectful phrase to ask about pain:", options: ["Does it hurt?", "Are you in any pain?", "Pain?"], correct: 1, explanation: "✅ 'Are you in any pain?' is gentle and professional." },
      { type: "fill", question: "Complete the sentence: '______ I check your blood pressure?'", options: ["May", "Should", "Will"], correct: 0, explanation: "🔹 'May I...' is the most formal and respectful way to ask." },
      { type: "multiple", question: "Listen to the phrase (click the audio icon). What does 'I'll bring you a warm blanket' mean?", options: ["I'll bring you medicine", "I'll bring you a warm blanket", "I'll help you walk"], correct: 1, explanation: "🧣 A warm blanket provides comfort and warmth." },
      { type: "translate", question: "Translate to English with a gentle tone: 'Do you need anything for the pain?'", options: ["You need pain?", "Do you need anything for the pain?", "Pain medicine now?"], correct: 1, explanation: "💙 'Do you need anything for the pain?' is complete and empathetic." },
      { type: "multiple", question: "Caregiver: 'It's time for your medication.' Patient: 'I don't want to take it.' Best response:", options: ["You have to take it now", "I understand. Would you like me to stay with you while you take it?", "Fine, skip it then"], correct: 1, explanation: "🌟 Validating feelings and offering companionship is best practice." },
      { type: "multiple", question: "What is the most calming phrase for an anxious senior?", options: ["Calm down", "Everything is okay. I am here with you.", "Stop worrying"], correct: 1, explanation: "💙 'Everything is okay. I am here with you' provides security and presence." },
      { type: "fill", question: "Complete: 'Let me ______ you to the dining room.'", options: ["escort", "accompany", "walk"], correct: 1, explanation: "🚶 'Accompany' is warmer and more professional than 'walk'." }
    ];

    // --------------------------------------------------------------
    // REAL DIALOGUES - Caregiver & Elderly Patient (100% ENGLISH)
    // --------------------------------------------------------------
    const DIALOGUES = [
      { role: "caregiver", text: "Good morning, Mrs. Johnson. How did you sleep last night?" },
      { role: "patient", text: "Good morning, dear. I slept a little, but I had some beautiful dreams." },
      { role: "caregiver", text: "That's wonderful. Would you like some warm water before breakfast?" },
      { role: "patient", text: "Yes, please. You are always so thoughtful. Thank you." },
      { role: "caregiver", text: "Of course. I'm here to make sure you feel comfortable and safe." },
      { role: "caregiver", text: "Let me help you sit up slowly. Take your time, there's no rush." },
      { role: "patient", text: "You are very patient with me. I really appreciate your kindness." },
      { role: "caregiver", text: "It's my pleasure. Now, are you ready for your medication?" },
      { role: "patient", text: "Yes, I'll take it with your help. Thank you for being here." },
      { role: "caregiver", text: "I'll be right outside if you need anything. Rest well, my friend." },
      { role: "patient", text: "Thank you. You make me feel safe." }
    ];

    const TOTAL_EXERCISES = EXERCISES.length;
    const POINTS_PER_CORRECT = 10;

    // Game state
    let currentIndex = 0;
    let totalScore = 0;
    let lives = 5;
    let answered = false;
    let selectedOptionIdx = null;
    let feedbackMsg = null;
    let feedbackType = null;

    // DOM elements
    let scoreSpan, heartsContainer, progressFill, progressPercentSpan, questionEl, optionsContainer, nextBtn, feedbackEl;

    // --------------------------------------------------------------
    // AUDIO SYSTEM - PURE AMERICAN ENGLISH
    // --------------------------------------------------------------
    let selectedVoice = null;
    let voiceReady = false;

    async function loadAmericanVoice() {
      return new Promise((resolve) => {
        if (!window.speechSynthesis) {
          console.warn("SpeechSynthesis not supported");
          resolve(false);
          return;
        }

        const checkVoices = () => {
          const voices = window.speechSynthesis.getVoices();
          console.log("Available voices:", voices.map(v => `${v.name} (${v.lang})`));
          
          // Priority: Google US English, then native Windows/Mac American voices
          let americanVoice = voices.find(voice => 
            voice.lang === 'en-US' && (voice.name.includes('Google') || voice.name.includes('Natural') || voice.name.includes('Premium'))
          );
          
          if (!americanVoice) {
            americanVoice = voices.find(voice => 
              voice.lang === 'en-US' && (voice.name.includes('Samantha') || voice.name.includes('Alex') || voice.name.includes('Microsoft David') || voice.name.includes('Microsoft Zira') || voice.name.includes('Jenny'))
            );
          }
          
          if (!americanVoice) {
            americanVoice = voices.find(voice => voice.lang === 'en-US');
          }
          
          if (americanVoice) {
            selectedVoice = americanVoice;
            voiceReady = true;
            console.log(`✅ Voice selected: ${selectedVoice.name} (${selectedVoice.lang}) - AMERICAN ENGLISH`);
            const statusDiv = document.getElementById('audioStatus');
            if (statusDiv) statusDiv.innerHTML = `<span class="text-green-700"><i class="fas fa-check-circle"></i> Audio ready: ${selectedVoice.name}</span>`;
          } else {
            console.warn("No American English voice found.");
            voiceReady = false;
            const statusDiv = document.getElementById('audioStatus');
            if (statusDiv) statusDiv.innerHTML = `<span class="text-red-600"><i class="fas fa-exclamation-triangle"></i> No English voice detected. Use Chrome/Edge for best experience.</span>`;
          }
          resolve(voiceReady);
        };

        if (window.speechSynthesis.getVoices().length > 0) {
          checkVoices();
        } else {
          window.speechSynthesis.onvoiceschanged = checkVoices;
          setTimeout(checkVoices, 1000);
        }
      });
    }

    async function speakEnglish(text, element = null) {
      if (!window.speechSynthesis) {
        alert("Your browser doesn't support audio. Use Chrome, Edge or Safari.");
        return;
      }

      if (!voiceReady || !selectedVoice) {
        await loadAmericanVoice();
        if (!voiceReady || !selectedVoice) {
          alert("⚠️ Could not load English voice. Please use Chrome or Edge and reload the page.");
          return;
        }
      }

      // Cancel any ongoing speech
      window.speechSynthesis.cancel();

      setTimeout(() => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.voice = selectedVoice;
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        
        console.log(`🔊 Speaking: "${text}" with voice: ${selectedVoice.name}`);

        if (element) {
          element.classList.add('playing');
          utterance.onend = () => element.classList.remove('playing');
          utterance.onerror = () => element.classList.remove('playing');
        }
        
        window.speechSynthesis.speak(utterance);
      }, 50);
    }

    // Load voices on start
    loadAmericanVoice();

    function updateUIState() {
      if (scoreSpan) scoreSpan.innerText = totalScore;
      if (progressPercentSpan) progressPercentSpan.innerText = Math.round((currentIndex / TOTAL_EXERCISES) * 100);
      if (progressFill) progressFill.style.width = `${(currentIndex / TOTAL_EXERCISES) * 100}%`;
      if (heartsContainer) {
        heartsContainer.innerHTML = '';
        for (let i = 0; i < 5; i++) {
          const heart = document.createElement('i');
          heart.className = i < lives ? 'fas fa-heart text-red-500 text-2xl mx-0.5' : 'far fa-heart text-gray-400 text-2xl mx-0.5';
          heartsContainer.appendChild(heart);
        }
      }
    }

    function renderCurrentExercise() {
      if (!questionEl || !optionsContainer) return;
      const exercise = EXERCISES[currentIndex];
      if (!exercise) return;
      
      let audioHint = '';
      if (exercise.question.includes("Listen")) {
        audioHint = `<div class="mb-4 flex items-center gap-3 bg-amber-50 p-3 rounded-xl border border-amber-200"><i class="fas fa-headphones text-amber-600 text-xl"></i> <span class="text-amber-800 font-medium">🎧 Click the audio icon next to options to hear AMERICAN ENGLISH pronunciation.</span></div>`;
      }
      questionEl.innerHTML = `<div class="text-2xl md:text-3xl font-bold text-stone-800">${exercise.question}</div>${audioHint}`;
      
      optionsContainer.innerHTML = '';
      exercise.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = `option-btn w-full text-left p-5 rounded-2xl border-2 transition-all duration-150 flex items-center gap-3 ${!answered ? 'hover:shadow-md cursor-pointer' : 'cursor-default'}`;
        
        if (answered) {
          if (idx === exercise.correct) btn.className += ' bg-emerald-50 border-emerald-400 ring-1 ring-emerald-200';
          else if (idx === selectedOptionIdx && idx !== exercise.correct) btn.className += ' bg-rose-50 border-rose-300';
          else btn.className += ' bg-white/70 border-amber-100';
        } else {
          btn.className += ' bg-white border-amber-200';
          if (selectedOptionIdx === idx) btn.className += ' bg-amber-50 border-amber-400';
        }
        
        const prefix = document.createElement('span');
        prefix.className = 'w-7 h-7 rounded-full bg-amber-100 text-amber-800 flex items-center justify-center font-medium text-sm';
        prefix.innerText = String.fromCharCode(65+idx);
        
        const textSpan = document.createElement('span');
        textSpan.className = 'text-stone-700 text-lg font-medium flex-1';
        textSpan.innerText = opt;
        
        btn.appendChild(prefix);
        btn.appendChild(textSpan);
        
        // Audio button for each option - AMERICAN ENGLISH
        const audioIcon = document.createElement('button');
        audioIcon.className = 'audio-btn ml-2 p-2 rounded-full bg-amber-100 text-amber-700 hover:bg-amber-200 transition flex-shrink-0';
        audioIcon.innerHTML = '<i class="fas fa-volume-up"></i>';
        audioIcon.addEventListener('click', async (e) => {
          e.stopPropagation();
          await speakEnglish(opt, audioIcon);
        });
        btn.appendChild(audioIcon);
        
        if (answered && idx === exercise.correct) {
          const check = document.createElement('span');
          check.className = 'text-emerald-600 text-xl ml-1';
          check.innerHTML = '✓';
          btn.appendChild(check);
        } else if (answered && idx === selectedOptionIdx && idx !== exercise.correct) {
          const cross = document.createElement('span');
          cross.className = 'text-rose-500 text-xl ml-1';
          cross.innerHTML = '✗';
          btn.appendChild(cross);
        }
        
        if (!answered) {
          btn.addEventListener('click', () => handleAnswer(idx));
        }
        optionsContainer.appendChild(btn);
      });
      
      if (nextBtn) {
        if (answered) {
          nextBtn.disabled = false;
          nextBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.add('bg-amber-700', 'hover:bg-amber-800', 'cursor-pointer');
        } else {
          nextBtn.disabled = true;
          nextBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
          nextBtn.classList.remove('bg-amber-700', 'hover:bg-amber-800');
        }
      }
    }

    function handleAnswer(selectedIdx) {
      if (answered) return;
      const exercise = EXERCISES[currentIndex];
      const isCorrect = (selectedIdx === exercise.correct);
      selectedOptionIdx = selectedIdx;
      answered = true;
      
      if (isCorrect) {
        totalScore += POINTS_PER_CORRECT;
        feedbackType = 'correct';
        feedbackMsg = `✅ Excellent! +${POINTS_PER_CORRECT} points. ${exercise.explanation}`;
      } else {
        if (lives > 0) lives--;
        if (heartsContainer) heartsContainer.classList.add('heart-pulse');
        setTimeout(() => heartsContainer?.classList.remove('heart-pulse'), 400);
        feedbackType = 'wrong';
        feedbackMsg = `❌ Incorrect. ${exercise.explanation}`;
      }
      updateUIState();
      renderCurrentExercise();
      showFeedback();
      
      if (lives === 0) {
        setTimeout(() => {
          if (confirm("💔 No hearts left. Would you like to restart the practice?")) resetGame();
        }, 150);
      }
    }
    
    function showFeedback() {
      if (!feedbackEl) return;
      if (!feedbackMsg) { feedbackEl.classList.add('hidden'); return; }
      feedbackEl.classList.remove('hidden');
      const bgClass = feedbackType === 'correct' ? 'bg-emerald-100 border-l-8 border-emerald-500 text-emerald-800' : 'bg-rose-100 border-l-8 border-rose-400 text-rose-800';
      feedbackEl.className = `feedback-animation p-4 rounded-xl ${bgClass} mt-6`;
      feedbackEl.innerHTML = `<p class="font-medium">${feedbackMsg}</p>`;
    }
    
    function nextExercise() {
      if (!answered) return;
      if (lives === 0) {
        if (confirm("❤️‍🩹 No lives left. Restart to continue learning?")) resetGame();
        return;
      }
      if (currentIndex + 1 < TOTAL_EXERCISES) {
        currentIndex++;
        answered = false;
        selectedOptionIdx = null;
        feedbackMsg = null;
        feedbackType = null;
        if (feedbackEl) feedbackEl.classList.add('hidden');
        renderCurrentExercise();
        updateUIState();
      } else {
        answered = true;
        feedbackMsg = `🎉 CONGRATULATIONS! You completed all exercises! Final score: ${totalScore} / ${TOTAL_EXERCISES * POINTS_PER_CORRECT}. You're becoming an excellent caregiver! 🌟`;
        feedbackType = 'complete';
        showFeedback();
        if (nextBtn) nextBtn.disabled = true;
        optionsContainer.innerHTML = `<div class="text-center p-8 bg-amber-50 rounded-2xl"><i class="fas fa-trophy text-6xl text-amber-500 mb-3"></i><p class="text-xl font-bold">✨ Module Completed! ✨</p><p class="text-stone-600 mt-2">Keep practicing the dialogues to improve your listening and speaking.</p><button id="resetFinalBtn" class="mt-6 bg-amber-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-amber-800">🔄 Restart Practice</button></div>`;
        document.getElementById('resetFinalBtn')?.addEventListener('click', () => resetGame());
      }
    }
    
    function resetGame() {
      currentIndex = 0;
      totalScore = 0;
      lives = 5;
      answered = false;
      selectedOptionIdx = null;
      feedbackMsg = null;
      feedbackType = null;
      if (feedbackEl) feedbackEl.classList.add('hidden');
      updateUIState();
      renderCurrentExercise();
      document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' });
    }
    
    // Build full page
    function buildFullUI() {
      const root = document.getElementById('app-root');
      if (!root) return;
      
      // Generate dialogues HTML (100% English)
      let dialoguesHtml = '';
      DIALOGUES.forEach((d, idx) => {
        const bgClass = d.role === 'caregiver' ? 'bg-amber-50 border-l-8 border-amber-400' : 'bg-white border-l-8 border-emerald-300';
        const icon = d.role === 'caregiver' ? '<i class="fas fa-user-nurse text-amber-600"></i>' : '<i class="fas fa-user-friends text-emerald-600"></i>';
        const roleName = d.role === 'caregiver' ? '👩🏽‍⚕️ CAREGIVER' : '👵🏽 SENIOR';
        dialoguesHtml += `
          <div class="${bgClass} p-5 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-start gap-3 transition hover:shadow-md">
            <div class="flex-1">
              <div class="flex items-center gap-2 font-bold text-stone-700">${icon} <span>${roleName}</span></div>
              <p class="text-xl font-semibold text-stone-800 mt-2">${d.text}</p>
            </div>
            <button class="audio-dialog-btn bg-amber-200 hover:bg-amber-300 text-amber-900 px-5 py-3 rounded-xl flex items-center gap-2 transition font-medium" data-phrase="${d.text.replace(/['"]/g, '\\"')}">
              <i class="fas fa-volume-up"></i> Listen (US 🇺🇸)
            </button>
          </div>
        `;
      });
      
      root.innerHTML = `
        <header class="relative bg-gradient-to-br from-[#f9e7d2] to-[#f7e1c4] overflow-hidden shadow-md">
          <div class="container mx-auto px-5 py-10 md:py-14">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
              <div class="flex-1 text-center md:text-left">
                <div class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-white/60 backdrop-blur-sm text-amber-800 text-sm font-semibold mb-4"><i class="fas fa-microphone-alt"></i> American English Audio 🇺🇸</div>
                <h1 class="text-4xl md:text-6xl font-extrabold text-stone-800 leading-tight">Speak, Listen & <br/>Care in <span class="text-amber-700">English</span></h1>
                <p class="text-lg text-stone-600 mt-4 max-w-xl">Real dialogues + native American pronunciation + interactive exercises. Train your ear for professional, compassionate caregiving.</p>
                <button id="startHeroBtn" class="mt-8 bg-amber-700 hover:bg-amber-800 text-white font-semibold px-8 py-4 rounded-2xl shadow-xl transition"><i class="fas fa-play mr-2"></i> Start Learning</button>
              </div>
              <div class="flex-1 flex justify-center">
                <div class="relative w-64 h-64 md:w-80 md:h-80 bg-gradient-to-tr from-[#e9cfb0] to-[#dbbd97] rounded-full flex items-center justify-center shadow-2xl">
                  <span class="text-8xl">🇺🇸🎙️</span>
                  <div class="absolute -bottom-4 -right-4 bg-white rounded-full p-3 shadow-lg"><i class="fas fa-headphones text-3xl text-amber-600"></i></div>
                </div>
              </div>
            </div>
          </div>
        </header>
        
        <section id="learning-app" class="container mx-auto px-4 py-12">
          <div class="max-w-4xl mx-auto">
            <div class="bg-white/70 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-8">
              <div class="flex flex-wrap justify-between items-center gap-4 mb-6 border-b border-amber-200 pb-3">
                <div class="flex items-center gap-4">
                  <div class="bg-amber-100 rounded-2xl px-4 py-2 shadow-inner"><i class="fas fa-trophy text-amber-600"></i> <span class="font-bold ml-1">Score</span> <span id="scoreValue" class="text-2xl font-black ml-2">0</span></div>
                  <div id="heartsContainer" class="flex gap-1 bg-rose-50 px-4 py-2 rounded-2xl"></div>
                </div>
                <div class="flex-1 max-w-xs">
                  <div class="flex justify-between text-sm font-medium text-stone-600 mb-1"><span>Progress</span><span id="progressPercent">0</span>%</div>
                  <div class="h-2.5 bg-amber-100 rounded-full overflow-hidden"><div id="progressFill" class="h-full bg-amber-600 rounded-full transition-all duration-300" style="width:0%"></div></div>
                </div>
              </div>
              <div class="bg-white rounded-3xl shadow-xl p-6 md:p-10">
                <div id="questionDisplay" class="mb-6"></div>
                <div id="optionsContainer" class="space-y-3"></div>
                <div id="feedbackMessage" class="hidden"></div>
                <div class="mt-8 flex justify-end">
                  <button id="nextButton" class="px-8 py-3 rounded-xl font-bold text-white text-lg transition-all bg-gray-300 cursor-not-allowed" disabled>Next Exercise →</button>
                </div>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Dialogues Section with American Audio -->
        <section class="container mx-auto px-4 py-12">
          <div class="max-w-5xl mx-auto">
            <div class="text-center mb-10">
              <h2 class="text-3xl md:text-4xl font-bold text-stone-800">🗣️ Real Dialogues: Caregiver + Senior</h2>
              <p class="text-stone-600 mt-2 text-lg">🇺🇸 <strong>Every phrase is read in NATIVE AMERICAN ENGLISH</strong> — click "Listen" to hear real pronunciation.</p>
              <div id="audioStatus" class="mt-3 inline-flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-full text-sm font-medium">
                <i class="fas fa-spinner fa-pulse"></i> Loading voices...
              </div>
            </div>
            <div class="space-y-5" id="dialoguesList">${dialoguesHtml}</div>
            <div class="mt-8 bg-gradient-to-r from-amber-100 to-amber-50 p-5 rounded-2xl text-center border border-amber-200">
              <i class="fas fa-lightbulb text-amber-600 text-xl mr-2"></i>
              <span class="font-medium">Pro Tip:</span> Repeat each phrase out loud after listening. Clear pronunciation builds trust with elderly adults.
            </div>
          </div>
        </section>
        
        <footer class="bg-stone-800 text-amber-100 py-8 mt-8 rounded-t-3xl">
          <div class="container mx-auto text-center">
            <p>✨ ElderCare English — American English for Professional Caregivers ✨</p>
            <p class="text-sm opacity-70 mt-1">Improve your communication and provide exceptional care with empathy.</p>
          </div>
        </footer>
      `;
      
      // Assign references
      scoreSpan = document.getElementById('scoreValue');
      heartsContainer = document.getElementById('heartsContainer');
      progressFill = document.getElementById('progressFill');
      progressPercentSpan = document.getElementById('progressPercent');
      questionEl = document.getElementById('questionDisplay');
      optionsContainer = document.getElementById('optionsContainer');
      nextBtn = document.getElementById('nextButton');
      feedbackEl = document.getElementById('feedbackMessage');
      
      if (nextBtn) nextBtn.addEventListener('click', nextExercise);
      document.getElementById('startHeroBtn')?.addEventListener('click', () => document.getElementById('learning-app')?.scrollIntoView({ behavior: 'smooth' }));
      
      // Assign audio events to dialogue buttons
      document.querySelectorAll('.audio-dialog-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const phrase = btn.getAttribute('data-phrase');
          if (phrase) {
            await speakEnglish(phrase, btn);
          }
        });
      });
      
      // Initialize state
      currentIndex = 0; totalScore = 0; lives = 5; answered = false; selectedOptionIdx = null;
      updateUIState();
      renderCurrentExercise();
      
      // Reload voices after a moment
      setTimeout(() => loadAmericanVoice(), 500);
    }
    
    buildFullUI();
  </script>
</body>
</html>
