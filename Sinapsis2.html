<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chambari Academy - Frases Divertidas</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: #fff;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  text-align: center;
}

.image {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

.phrase {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
}

.translation {
  color: #94a3b8;
  margin-bottom: 20px;
}

.buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.play { background: #22c55e; }
.quiz { background: #3b82f6; }
.next { background: #f59e0b; }

.quiz-box {
  margin-top: 20px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  width: 100%;
  margin-bottom: 10px;
}

.result {
  font-weight: bold;
  margin-top: 10px;
}

</style>
</head>
<body>

<div class="container">
  <h1>Aprende frases como nativo</h1>
  <div id="app"></div>
</div>

<script>

const frases = [
  {
    texto: "What's up?",
    traduccion: "¿Qué tal?",
    imagen: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"
  },
  {
    texto: "I'm down",
    traduccion: "Me apunto",
    imagen: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e"
  },
  {
    texto: "No way!",
    traduccion: "¡No puede ser!",
    imagen: "https://images.unsplash.com/photo-1517841905240-472988babdf9"
  }
];

let index = 0;

function renderAlumno() {
  const frase = frases[index];

  document.getElementById('app').innerHTML = `
    <div class="card">
      <img class="image" src="${frase.imagen}" />
      <div class="phrase">${frase.texto}</div>
      <div class="translation">${frase.traduccion}</div>

      <div class="buttons">
        <button class="play" id="btnPlay">Escuchar</button>
        <button class="quiz" id="btnQuiz">Practicar</button>
        <button class="next" id="btnNext">Siguiente</button>
      </div>

      <div id="quiz"></div>
    </div>
  `;

  // EVENTOS (esto arregla que no funcionen)
  document.getElementById('btnPlay').addEventListener('click', playAudio);
  document.getElementById('btnQuiz').addEventListener('click', mostrarQuiz);
  document.getElementById('btnNext').addEventListener('click', nextFrase);
}

function playAudio() {
  const texto = frases[index].texto;
  const utterance = new SpeechSynthesisUtterance(texto);
  utterance.lang = 'en-US';
  speechSynthesis.speak(utterance);
}

function mostrarQuiz() {
  document.getElementById('quiz').innerHTML = `
    <div class="quiz-box">
      <input id="respuesta" placeholder="Escribe la frase en inglés" />
      <button id="btnValidar">Validar</button>
      <div id="resultado" class="result"></div>
    </div>
  `;

  document.getElementById('btnValidar').addEventListener('click', validarRespuesta);
}

function validarRespuesta() {
  const input = document.getElementById('respuesta').value.trim().toLowerCase();
  const correcta = frases[index].texto.toLowerCase();
  const result = document.getElementById('resultado');

  if (input === correcta) {
    result.innerText = "Correcto";
    result.style.color = "#22c55e";
  } else {
    result.innerText = "Intenta otra vez";
    result.style.color = "#ef4444";
  }
}

function nextFrase() {
  index++;
  if (index >= frases.length) index = 0;
  renderAlumno();
}

renderAlumno();

</script>

</body>
</html>
